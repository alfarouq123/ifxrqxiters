<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>IFxrq // online</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
<style>
  :root{
    --bg: #0c0b12;
    --panel: #16141d;
    --panel-2: #1d1a26;
    --line: #2b2734;
    --text: #ece9f4;
    --muted: #8d879b;
    --accent: #a855f7;
    --accent-2: #7c3aed;
    --accent-light: #c084fc;
    --on-accent: #ffffff;
    --magenta: #ff3d9a;
    --danger: #ff5c5c;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%; margin:0;}
  body{
    background:
      radial-gradient(ellipse 1200px 600px at 15% -10%, rgba(168,85,247,0.08), transparent 60%),
      radial-gradient(ellipse 900px 600px at 100% 10%, rgba(255,61,154,0.05), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Inter', sans-serif;
    overflow:hidden;
  }
  .app{ width:100%; height:100vh; height:100dvh; background:var(--panel); display:flex; flex-direction:column; overflow:hidden; position:relative; }

  /* ===== HEADER ===== */
  .head{ padding:14px 18px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:12px; background:linear-gradient(180deg, var(--panel-2), var(--panel)); }
  .avatar{
    width:44px; height:44px; flex-shrink:0;
    clip-path: polygon(25% 3%, 75% 3%, 100% 50%, 75% 97%, 25% 97%, 0% 50%);
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display:flex; align-items:center; justify-content:center;
    font-family:'Chakra Petch', sans-serif; font-weight:700; color:var(--on-accent); font-size:17px; position:relative;
  }
  .dot{
    position:absolute; bottom:-1px; right:-1px; width:12px; height:12px; border-radius:50%;
    background:var(--accent); border:2px solid var(--panel); box-shadow:0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .head-info{flex:1; min-width:0;}
  .head-name{ font-family:'Chakra Petch', sans-serif; font-weight:700; font-size:17px; letter-spacing:0.3px; display:flex; align-items:center; gap:8px; }
  .head-tag{ font-size:10px; font-family:'JetBrains Mono', monospace; color:var(--on-accent); background:var(--accent); padding:1px 6px; border-radius:4px; font-weight:500; letter-spacing:0.5px; }
  .head-sub{ font-size:12px; color:var(--muted); font-family:'JetBrains Mono', monospace; margin-top:2px; }

  /* ===== HUD STRIP ===== */
  .hud{ display:flex; font-family:'JetBrains Mono', monospace; font-size:10.5px; color:var(--muted); border-bottom:1px solid var(--line); background:#100e17; }
  .hud div{ flex:1; padding:6px 14px; border-right:1px solid var(--line); }
  .hud div:last-child{border-right:none;}
  .hud b{color:var(--text); font-weight:500;}

  /* ===== MODE BANNER ===== */
  .mode-banner{ display:none; align-items:center; gap:8px; background:rgba(168,85,247,0.1); border-bottom:1px solid rgba(168,85,247,0.35); padding:8px 14px; font-family:'JetBrains Mono', monospace; font-size:11.5px; color:var(--accent-light); }
  .mode-banner.show{ display:flex; }
  .mode-banner button{ margin-left:auto; background:transparent; border:1px solid var(--accent); color:var(--accent-light); border-radius:7px; padding:3px 8px; font-size:10.5px; cursor:pointer; font-family:'JetBrains Mono', monospace; }

  /* ===== CHAT ===== */
  .chat{ flex:1; overflow-y:auto; overflow-x:hidden; padding:18px; display:flex; flex-direction:column; gap:12px; max-width:900px; width:100%; margin:0 auto; }
  .chat::-webkit-scrollbar{width:6px;}
  .chat::-webkit-scrollbar-thumb{background:var(--line); border-radius:3px;}

  .row{ display:flex; gap:8px; align-items:flex-end; max-width:78%; min-width:0; }
  .row.bot{ align-self:flex-start; }
  .row.user{ align-self:flex-end; flex-direction:row-reverse; }
  .mini-av{
    width:24px; height:24px; flex-shrink:0;
    clip-path: polygon(25% 3%, 75% 3%, 100% 50%, 75% 97%, 25% 97%, 0% 50%);
    background:linear-gradient(135deg, var(--accent), var(--accent-2));
    display:flex; align-items:center; justify-content:center;
    font-family:'Chakra Petch', sans-serif; font-weight:700; font-size:10px; color:var(--on-accent);
  }
  .bubble{ padding:10px 13px; font-size:14.5px; line-height:1.55; word-break:break-word; min-width:0; }
  .row.bot .bubble{ background:var(--panel-2); border:1px solid var(--line); border-radius:3px 14px 14px 14px; color:var(--text); }
  .row.user .bubble{
    background: linear-gradient(135deg, rgba(168,85,247,0.2), rgba(168,85,247,0.09));
    border:1px solid rgba(168,85,247,0.4); border-radius:14px 3px 14px 14px; color:var(--text); white-space:pre-wrap;
  }
  .row.sys{ align-self:center; max-width:95%; }
  .row.sys .bubble{ background:transparent; border:1px dashed var(--line); color:var(--muted); font-family:'JetBrains Mono', monospace; font-size:11.5px; text-align:center; border-radius:8px; }
  .row.err .bubble{ border-color:rgba(255,92,92,0.4); color:var(--danger); }

  .mention-tag{ color:var(--accent-light); font-weight:600; }
  .plain-link{ color:var(--accent-light); text-decoration:underline; }

  /* ===== MARKDOWN CONTENT ===== */
  .bubble p{ margin:0 0 8px; }
  .bubble p:last-child{ margin-bottom:0; }
  .bubble ul, .bubble ol{ margin:0 0 8px 18px; }
  .bubble a{ color:var(--accent-light); }
  .bubble code{ background:#100e17; border:1px solid var(--line); border-radius:4px; padding:1px 5px; font-family:'JetBrains Mono', monospace; font-size:12.5px; color:var(--accent-light); }
  .bubble table{ border-collapse:collapse; width:100%; margin:8px 0; font-size:13px; }
  .bubble th, .bubble td{ border:1px solid var(--line); padding:6px 9px; text-align:left; }
  .bubble th{ background:#100e17; font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--accent-light); }
  .bubble tr:nth-child(even) td{ background:rgba(255,255,255,0.02); }
  .bubble img{ max-width:100%; border-radius:9px; margin:6px 0; border:1px solid var(--line); display:block; }

  /* ===== CODE CARD (compact, di dalem chat) ===== */
  .code-block{ margin:8px 0; border:1px solid var(--line); border-radius:9px; overflow:hidden; cursor:pointer; }
  .code-head{ display:flex; align-items:center; justify-content:space-between; gap:8px; background:#100e17; padding:6px 10px; font-family:'JetBrains Mono', monospace; font-size:10.5px; color:var(--muted); border-bottom:1px solid var(--line); }
  .code-actions{ display:flex; gap:6px; }
  .code-head button{ background:transparent; border:1px solid var(--line); color:var(--muted); border-radius:5px; font-size:10px; padding:3px 8px; cursor:pointer; font-family:'JetBrains Mono', monospace; white-space:nowrap; }
  .code-head button:hover{ color:var(--accent-light); border-color:var(--accent); }
  .code-block pre{ margin:0; padding:12px; overflow-x:hidden; overflow-y:auto; font-size:12.5px; max-height:220px; white-space:pre-wrap; word-break:break-word; }
  .code-block pre code{ background:none; border:none; padding:0; color:inherit; white-space:pre-wrap; word-break:break-word; }

  .typing{ display:flex; gap:4px; padding:11px 14px; background:var(--panel-2); border:1px solid var(--line); border-radius:3px 14px 14px 14px; width:fit-content; }
  .typing span{ width:6px; height:6px; border-radius:50%; background:var(--accent); opacity:0.5; animation:blink 1.1s infinite; }
  .typing span:nth-child(2){ animation-delay:.15s; }
  .typing span:nth-child(3){ animation-delay:.3s; }
  @keyframes blink{ 0%,80%,100%{opacity:.25; transform:translateY(0);} 40%{opacity:1; transform:translateY(-2px);} }

  /* ===== BADGE (search/coder/edit) ===== */
  .search-badge{ display:inline-flex; align-items:center; gap:5px; font-family:'JetBrains Mono', monospace; font-size:10px; color:var(--accent-light); background:rgba(168,85,247,0.12); border:1px solid rgba(168,85,247,0.35); padding:2px 8px; border-radius:20px; margin-bottom:8px; }
  .source-list{ margin-top:10px; display:flex; flex-direction:column; gap:6px; }
  .source-item{ display:flex; align-items:center; gap:8px; background:#100e17; border:1px solid var(--line); border-radius:9px; padding:7px 9px; }
  .source-favicon{ width:18px; height:18px; border-radius:4px; flex-shrink:0; background:var(--panel); }
  .source-meta{ flex:1; min-width:0; }
  .source-title{ font-size:12px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .source-host{ font-size:10px; color:var(--muted); font-family:'JetBrains Mono', monospace; }
  .source-btn{ flex-shrink:0; background:transparent; border:1px solid var(--accent); color:var(--accent-light); font-family:'JetBrains Mono', monospace; font-size:10px; padding:5px 9px; border-radius:7px; cursor:pointer; letter-spacing:0.4px; }
  .source-btn:hover{ background:var(--accent); color:var(--on-accent); }

  /* ===== ATTACHMENTS PREVIEW ===== */
  .attach-strip{ display:flex; gap:6px; padding:8px 14px 0; flex-wrap:wrap; }
  .chip{ display:flex; align-items:center; gap:6px; background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:4px 8px 4px 4px; font-size:11px; font-family:'JetBrains Mono', monospace; color:var(--muted); }
  .chip img{ width:22px; height:22px; object-fit:cover; border-radius:5px; }
  .chip .filedot{ width:22px; height:22px; border-radius:5px; background:var(--panel-2); display:flex; align-items:center; justify-content:center; font-size:12px; }
  .chip button{ background:none; border:none; color:var(--muted); cursor:pointer; font-size:13px; padding:0 2px; }
  .chip button:hover{ color:var(--danger); }

  /* ===== INPUT WRAPPER (full lebar buat border + background) ===== */
  .inputbar-outer{ border-top:1px solid var(--line); background:var(--panel-2); padding-bottom:env(safe-area-inset-bottom); }
  .inputbar{ padding:10px 14px; display:flex; gap:8px; align-items:flex-end; position:relative; max-width:900px; width:100%; margin:0 auto; }
  .iconbtn{ width:42px; height:42px; border-radius:12px; border:1px solid var(--line); background:var(--bg); color:var(--muted); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:.15s; font-size:22px; font-weight:400; line-height:1; }
  .iconbtn:hover{ color:var(--accent-light); border-color:var(--accent); }
  .iconbtn.active{ color:var(--accent-light); border-color:var(--accent); transform:rotate(45deg); }
  .input-wrap{ flex:1; position:relative; }
  #input{
    width:100%; min-height:42px; max-height:140px; overflow-y:auto;
    background:var(--bg); border:1px solid var(--line); border-radius:12px; padding:10px 12px;
    color:var(--text); font-family:'Inter', sans-serif; font-size:14px; line-height:1.4;
    white-space:pre-wrap; word-break:break-word; outline:none;
  }
  #input:focus{ border-color:var(--accent); }
  #input:empty:before{ content:attr(data-placeholder); color:var(--muted); pointer-events:none; }
  .send{ width:42px; height:42px; border-radius:12px; border:none; background:var(--accent); color:var(--on-accent); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:.15s; }
  .send:hover{ background:var(--accent-light); }
  .send:disabled{ background:var(--line); color:var(--muted); cursor:not-allowed; }

  /* ===== PLUS MENU ===== */
  .plus-menu{ position:absolute; bottom:56px; left:14px; width:210px; background:var(--panel-2); border:1px solid var(--line); border-radius:12px; padding:6px; display:none; flex-direction:column; gap:2px; box-shadow:0 12px 30px -10px rgba(0,0,0,0.6); z-index:20; }
  .plus-menu.show{ display:flex; }
  .plus-item{ display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; cursor:pointer; font-size:13px; color:var(--text); }
  .plus-item span{ flex:1; }
  .plus-item:hover{ background:var(--bg); color:var(--accent-light); }
  .plus-item.back{ color:var(--muted); font-size:11.5px; border-bottom:1px solid var(--line); margin-bottom:3px; padding-bottom:10px; }

  /* ===== @ MENTION DROPDOWN ===== */
  .mention-dropdown{ position:absolute; bottom:52px; left:0; width:100%; background:var(--panel-2); border:1px solid var(--line); border-radius:12px; padding:6px; display:none; z-index:20; box-shadow:0 12px 30px -10px rgba(0,0,0,0.6); }
  .mention-dropdown.show{ display:block; }
  .mention-item{ display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:8px; cursor:pointer; }
  .mention-item:hover{ background:var(--bg); }
  .mention-item b{ color:var(--accent-light); font-family:'JetBrains Mono', monospace; font-size:12.5px; }
  .mention-item span{ font-size:11px; color:var(--muted); }

  /* ===== OVERLAYS ===== */
  .overlay{ position:absolute; inset:0; background:rgba(0,0,0,0.7); display:none; align-items:stretch; justify-content:stretch; z-index:30; }
  .overlay.show{ display:flex; }
  .viewer-panel{ width:100%; height:100%; background:var(--panel); display:flex; flex-direction:column; }
  .viewer-header{ display:flex; align-items:center; gap:8px; padding:10px 14px; border-bottom:1px solid var(--line); background:var(--panel-2); font-family:'JetBrains Mono', monospace; font-size:12px; color:var(--text); }
  .viewer-favicon{ width:16px; height:16px; border-radius:3px; }
  .viewer-header a, .viewer-header button{ background:transparent; border:1px solid var(--line); color:var(--muted); width:28px; height:28px; border-radius:7px; display:flex; align-items:center; justify-content:center; cursor:pointer; text-decoration:none; font-size:14px; }
  .viewer-header a:hover, .viewer-header button:hover{ color:var(--accent-light); border-color:var(--accent); }
  .viewer-iframe{ flex:1; width:100%; border:none; background:#fff; }
  .viewer-note{ font-size:10px; color:var(--muted); font-family:'JetBrains Mono', monospace; padding:6px 14px; border-top:1px solid var(--line); background:var(--panel-2); }

  /* ===== ARTIFACT VIEWER (kayak Claude: tab kode / preview) ===== */
  .artifact-tabs{ display:flex; gap:4px; margin-left:8px; }
  .artifact-tab{ background:transparent; border:1px solid var(--line); color:var(--muted); padding:5px 12px; border-radius:7px; font-size:11px; cursor:pointer; font-family:'JetBrains Mono', monospace; width:auto; height:auto; }
  .artifact-tab.active{ background:var(--accent); color:var(--on-accent); border-color:var(--accent); }
  .artifact-body{ flex:1; overflow:hidden; background:#100e17; display:flex; }
  .artifact-body pre{ flex:1; margin:0; padding:18px; overflow-x:hidden; overflow-y:auto; font-size:13px; white-space:pre-wrap; word-break:break-word; }
  .artifact-body pre code{ white-space:pre-wrap; word-break:break-word; }
  .artifact-body iframe{ flex:1; border:none; background:#fff; }

  /* ===== PHOTO EDITOR ===== */
  .editor-body{ flex:1; display:flex; align-items:center; justify-content:center; background:#000; overflow:hidden; }
  #editorCanvas{ max-width:100%; max-height:100%; }
  .editor-controls{ padding:12px 16px; background:var(--panel-2); border-top:1px solid var(--line); display:flex; flex-direction:column; gap:10px; }
  .editor-row{ display:flex; gap:8px; }
  .editor-row button{ flex:1; padding:9px; border-radius:9px; border:1px solid var(--line); background:var(--bg); color:var(--text); font-size:12.5px; cursor:pointer; }
  .editor-row button:hover{ border-color:var(--accent); color:var(--accent-light); }
  .editor-controls label{ display:flex; align-items:center; gap:10px; font-size:11px; color:var(--muted); font-family:'JetBrains Mono', monospace; }
  .editor-controls input[type=range]{ flex:1; accent-color:var(--accent); }
  .editor-actions{ display:flex; gap:8px; padding:0 16px 16px; background:var(--panel-2); }
  .btn{ flex:1; padding:11px; border-radius:9px; border:1px solid var(--line); background:transparent; color:var(--text); font-family:'Inter', sans-serif; font-weight:500; font-size:13px; cursor:pointer; }
  .btn.primary{ background:var(--accent); color:var(--on-accent); border:none; }
</style>
</head>
<body>

<div class="app">

  <div class="head">
    <div class="avatar">IF<div class="dot"></div></div>
    <div class="head-info">
      <div class="head-name">ifxrq <span class="head-tag">ONLINE</span></div>
      <div class="head-sub" id="pingLine">watskin jr. · ping 24ms</div>
    </div>
  </div>

  <div class="hud">
    <div>sesi: <b id="hudSession">----</b></div>
    <div>pesan: <b id="hudCount">0</b></div>
  </div>

  <div class="mode-banner" id="modeBanner">
    <span id="modeBannerText">💻 mode aktif</span>
    <button type="button" id="modeBannerExit">✕ keluar</button>
  </div>

  <div class="chat" id="chat"></div>

  <div class="attach-strip" id="attachStrip"></div>

  <div class="inputbar-outer">
    <div class="inputbar">
      <input type="file" id="fileInput" multiple hidden>
      <div class="iconbtn" id="plusBtn" title="tambah">+</div>
      <div class="plus-menu" id="plusMenu"></div>

      <div class="input-wrap">
        <div id="input" contenteditable="true" data-placeholder="ketik sesuatu ke ifxrq... (@search, @edit, atau pencet + > plugin)"></div>
        <div class="mention-dropdown" id="mentionDropdown"></div>
      </div>

      <button class="send" id="sendBtn" title="kirim">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </div>
  </div>

  <!-- SUMBER viewer -->
  <div class="overlay" id="viewerOverlay">
    <div class="viewer-panel">
      <div class="viewer-header">
        <img id="viewerFavicon" class="viewer-favicon">
        <span id="viewerHost">-</span>
        <div style="flex:1"></div>
        <a id="viewerNewTab" href="#" target="_blank" rel="noopener" title="buka di tab baru">↗</a>
        <button type="button" id="viewerClose" title="tutup">✕</button>
      </div>
      <iframe id="viewerIframe" class="viewer-iframe"></iframe>
      <div class="viewer-note">nampilin sumber tanpa keluar dari domain ini — kalo halamannya nolak ditampilin (blokir iframe), pake tombol ↗ buat buka di tab baru.</div>
    </div>
  </div>

  <!-- ARTIFACT VIEWER (kode + preview, kayak Claude) -->
  <div class="overlay" id="artifactOverlay">
    <div class="viewer-panel">
      <div class="viewer-header">
        <span id="artifactTitle">📄 kode</span>
        <div class="artifact-tabs">
          <button type="button" class="artifact-tab active" data-tab="code">kode</button>
          <button type="button" class="artifact-tab" data-tab="preview" id="artifactPreviewTab" style="display:none;">preview</button>
        </div>
        <div style="flex:1"></div>
        <button type="button" id="artifactCopy" title="salin">copy</button>
        <button type="button" id="artifactDownload" title="unduh">⬇</button>
        <button type="button" id="artifactClose" title="tutup">✕</button>
      </div>
      <div class="artifact-body">
        <pre id="artifactCodeView"><code id="artifactCodeEl"></code></pre>
        <iframe id="artifactPreviewFrame" style="display:none;" sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups"></iframe>
      </div>
    </div>
  </div>

  <!-- PHOTO EDITOR -->
  <div class="overlay" id="photoEditOverlay">
    <div class="viewer-panel">
      <div class="viewer-header">
        <span>✂️ edit foto</span>
        <div style="flex:1"></div>
        <button type="button" id="editorCancel" title="batal semua">✕</button>
      </div>
      <div class="editor-body"><canvas id="editorCanvas"></canvas></div>
      <div class="editor-controls">
        <div class="editor-row">
          <button type="button" id="editorRotateLeft">⟲ putar kiri</button>
          <button type="button" id="editorRotateRight">⟳ putar kanan</button>
        </div>
        <label>terang <input type="range" id="editorBrightness" min="-60" max="60" value="0"></label>
        <label>kontras <input type="range" id="editorContrast" min="-60" max="60" value="0"></label>
      </div>
      <div class="editor-actions">
        <button type="button" class="btn" id="editorSkip">lewati foto ini</button>
        <button type="button" class="btn primary" id="editorUse">pakai foto</button>
      </div>
    </div>
  </div>

</div>

<script>
// ============================================================
// KONFIGURASI
// ============================================================
const MODEL = "gemini-3.1-flash-lite";
const CHAT_ENDPOINT = "/api/chat";
const SEARCH_ENDPOINT = "/api/search";
const CODER_ENDPOINT = "/api/coder";

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ============================================================
// HIGHLIGHT @mention + link
// ============================================================
function mentionHtml(text){
  const escaped = escapeHtml(text);
  const cmds = PLUGIN_MENU.filter(function(p){ return p.type === 'mention'; }).map(function(p){ return p.cmd; });
  const pattern = cmds.join('|');
  const withMentions = pattern ? escaped.replace(new RegExp('@(' + pattern + ')\\b','gi'), '<span class="mention-tag">@$1</span>') : escaped;
  return withMentions.replace(/\n/g, '<br>');
}
function mentionAndLinkHtml(text){
  let html = mentionHtml(text);
  html = html.replace(/((https?:\/\/)[^\s<]+)/gi, '<a href="$1" target="_blank" rel="noopener" class="plain-link">$1</a>');
  return html;
}

// CARET HELPERS
// ============================================================
function getCaretOffset(el){
  let caretOffset = 0;
  const sel = window.getSelection();
  if(sel.rangeCount > 0){
    const range = sel.getRangeAt(0);
    const preRange = range.cloneRange();
    preRange.selectNodeContents(el);
    preRange.setEnd(range.endContainer, range.endOffset);
    caretOffset = preRange.toString().length;
  }
  return caretOffset;
}
function setCaretOffset(el, offset){
  const range = document.createRange();
  const sel = window.getSelection();
  let node = null;
  let remaining = offset;
  const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null);
  while(walker.nextNode()){
    node = walker.currentNode;
    if(remaining <= node.length) break;
    remaining -= node.length;
  }
  if(node){
    range.setStart(node, Math.max(0, Math.min(remaining, node.length)));
    range.collapse(true);
  } else {
    range.selectNodeContents(el);
    range.collapse(false);
  }
  sel.removeAllRanges();
  sel.addRange(range);
}
function getPlainText(el){
  // innerText kadang beda antar browser di contenteditable
  // textContent lebih konsisten tapi gak normalin whitespace
  // pakai innerText dulu, fallback ke textContent
  const raw = (el.innerText !== undefined ? el.innerText : el.textContent) || '';
  return raw.replace(/\u00A0/g, ' ');
}
function renderInput(text, caret){
  inputEl.innerHTML = mentionHtml(text);
  setCaretOffset(inputEl, caret);
  triggerMentionCheck(text, caret);
}
function insertAtCaret(text){
  const caret = getCaretOffset(inputEl);
  const full = getPlainText(inputEl);
  const newFull = full.slice(0, caret) + text + full.slice(caret);
  renderInput(newFull, caret + text.length);
}
function insertMention(cmd){
  const caret = getCaretOffset(inputEl);
  const full = getPlainText(inputEl);
  const before = full.slice(0, caret);
  const after = full.slice(caret);
  const match = before.match(/@(\w*)$/);
  let newText, newCaret;
  if(match){
    newText = before.slice(0, match.index) + '@' + cmd + ' ' + after;
    newCaret = match.index + cmd.length + 2;
  } else {
    newText = (before ? before + ' ' : '') + '@' + cmd + ' ' + after;
    newCaret = newText.length - after.length;
  }
  renderInput(newText, newCaret);
  inputEl.focus();
  mentionDropdown.classList.remove('show');
}

function renderMentionDropdown(filtered){
  mentionDropdown.innerHTML = filtered.map(function(p){
    return '<div class="mention-item" data-cmd="' + p.cmd + '">' + p.icon + '<div><b>@' + p.cmd + '</b><br><span>' + p.desc + '</span></div></div>';
  }).join('');
  mentionDropdown.querySelectorAll('.mention-item').forEach(function(el){
    el.addEventListener('click', function(){
      insertMention(el.dataset.cmd);
      mentionDropdown.classList.remove('show');
    });
  });
  mentionDropdown.classList.add('show');
}
function triggerMentionCheck(text, caret){
  const beforeCaret = text.slice(0, caret);
  const match = beforeCaret.match(/@(\w*)$/);
  if(match){
    const q = match[1].toLowerCase();
    const filtered = PLUGIN_MENU.filter(function(p){ return p.type === 'mention' && p.cmd.startsWith(q); });
    if(filtered.length){ renderMentionDropdown(filtered); return; }
  }
  mentionDropdown.classList.remove('show');
}

inputEl.addEventListener('input', function(){
  const caret = getCaretOffset(inputEl);
  const text = getPlainText(inputEl);
  renderInput(text, caret);
});
inputEl.addEventListener('keydown', function(e){
  if(e.key === 'Enter'){
    e.preventDefault();
    if(mentionDropdown.classList.contains('show')){
      const first = mentionDropdown.querySelector('.mention-item');
      if(first){ insertMention(first.dataset.cmd); return; }
    }
    if(e.shiftKey){ insertAtCaret('\n'); }
    else { sendMessage(); }
  }
});

function renderMarkdown(raw){
  const text = typeof raw === 'string' ? raw : JSON.stringify(raw, null, 2);
  const dirty = marked.parse(text);
  const clean = DOMPurify.sanitize(dirty, { ADD_ATTR: ['target'] });
  const wrap = document.createElement('div');
  wrap.innerHTML = clean;

  wrap.querySelectorAll('pre code').forEach(function(codeEl){
    const lang = (codeEl.className.match(/language-(\w+)/) || [,'text'])[1];
    const codeText = codeEl.textContent;
    const card = buildCodeCard(codeText, lang);
    codeEl.parentElement.replaceWith(card);
  });

  return wrap;
}

function buildCodeCard(code, language){
  const lang = (language || 'text').toLowerCase();
  const card = document.createElement('div');
  card.className = 'code-block';

  const head = document.createElement('div');
  head.className = 'code-head';
  const langLabel = document.createElement('span');
  langLabel.textContent = lang;
  head.appendChild(langLabel);

  const actions = document.createElement('div');
  actions.className = 'code-actions';

  const openBtn = document.createElement('button');
  openBtn.type = 'button';
  openBtn.textContent = '⤢ buka';
  openBtn.addEventListener('click', function(e){ e.stopPropagation(); openArtifact(code, lang); });
  actions.appendChild(openBtn);

  const dlBtn = document.createElement('button');
  dlBtn.type = 'button';
  dlBtn.textContent = '⬇ unduh';
  dlBtn.addEventListener('click', function(e){ e.stopPropagation(); downloadCode(code, lang); });
  actions.appendChild(dlBtn);

  const copyBtn = document.createElement('button');
  copyBtn.type = 'button';
  copyBtn.textContent = 'copy';
  copyBtn.addEventListener('click', function(e){
    e.stopPropagation();
    navigator.clipboard.writeText(code);
    e.target.textContent = 'disalin ✓';
    setTimeout(function(){ e.target.textContent = 'copy'; }, 1500);
  });
  actions.appendChild(copyBtn);

  head.appendChild(actions);
  card.appendChild(head);

  const pre = document.createElement('pre');
  const codeEl = document.createElement('code');
  codeEl.className = 'language-' + lang;
  codeEl.textContent = code.length > 700 ? code.slice(0, 700) + '\n...' : code;
  pre.appendChild(codeEl);
  card.appendChild(pre);
  hljs.highlightElement(codeEl);

  card.addEventListener('click', function(){ openArtifact(code, lang); });

  return card;
}

function downloadCode(code, language){
  const ext = EXT_MAP[language] || 'txt';
  const blob = new Blob([code], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ifxrq-' + Date.now() + '.' + ext;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
}

function openArtifact(code, language){
  const lang = (language || 'text').toLowerCase();
  currentArtifact = { code: code, language: lang };
  document.getElementById('artifactTitle').textContent = '📄 kode.' + (EXT_MAP[lang] || 'txt');

  const codeEl = document.getElementById('artifactCodeEl');
  codeEl.className = 'language-' + lang;
  codeEl.textContent = code;
  hljs.highlightElement(codeEl);

  const looksHtml = lang.indexOf('html') !== -1 || /<!DOCTYPE html|<html[\s>]/i.test(code);
  const previewTab = document.getElementById('artifactPreviewTab');
  previewTab.style.display = looksHtml ? 'inline-flex' : 'none';

  setArtifactTab(looksHtml ? 'preview' : 'code');
  document.getElementById('artifactOverlay').classList.add('show');
}

    frame.style.display = 'block';
    frame.srcdoc = currentArtifact.code;

    frame.style.display = 'none';

function isTextFile(file){
  if(file.type && file.type.indexOf('text/') === 0) return true;
  if(file.type === 'application/json') return true;
  if(TEXT_EXT_REGEX.test(file.name)) return true;
  return false;
}
function fileToText(file){
  return new Promise(function(resolve, reject){
    const r = new FileReader();
    r.onload = function(){ resolve(r.result); };
    r.onerror = reject;
    r.readAsText(file);
  });
}
function fileToBase64(file){
  return new Promise(function(resolve, reject){
    const r = new FileReader();
    r.onload = function(){ resolve(r.result.split(',')[1]); };
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}
function renderAttachStrip(){
  attachStrip.innerHTML = '';
  attachments.forEach(function(a, idx){
    const chip = document.createElement('div');
    chip.className = 'chip';
    if(a.previewUrl){
      chip.innerHTML = '<img src="' + a.previewUrl + '">';
    } else if(a.kind === 'text'){
      chip.innerHTML = '<div class="filedot">📝</div>';
    } else {
      chip.innerHTML = '<div class="filedot">📄</div>';
    }
    const label = document.createElement('span');
    label.textContent = a.name.length > 16 ? a.name.slice(0,14) + '…' : a.name;
    chip.appendChild(label);
    const rm = document.createElement('button');
    rm.textContent = '✕';
    rm.addEventListener('click', function(){ attachments.splice(idx,1); renderAttachStrip(); });
    chip.appendChild(rm);
    attachStrip.appendChild(chip);
  });
}

fileInput.addEventListener('change', async function(){
  const files = Array.from(fileInput.files);
  fileInput.value = '';
  if(files.length === 0) return;

  if(pickMode === 'camera' || pickMode === 'photo'){
    startPhotoEditQueue(files);
    return;
  }

  for(const file of files){
    if(file.size > 8 * 1024 * 1024){
      addSystemLine('[system] ' + file.name + ' kegedean (>8mb), skip', true);
      continue;
    }
    if(isTextFile(file)){
      const text = await fileToText(file);
      attachments.push({ name:file.name, mimeType:file.type || 'text/plain', kind:'text', textContent:text, previewUrl:null });
    } else if(file.type.indexOf('image/') === 0){
      const data = await fileToBase64(file);
      attachments.push({ name:file.name, mimeType:file.type, kind:'binary', data:data, previewUrl:URL.createObjectURL(file) });
    } else {
      const data = await fileToBase64(file);
      attachments.push({ name:file.name, mimeType:file.type || 'application/octet-stream', kind:'binary', data:data, previewUrl:null });
    }
  }
  renderAttachStrip();
});

// ============================================================
// PHOTO EDITOR
// ============================================================
function startPhotoEditQueue(files){
  photoQueue = Array.from(files).filter(function(f){ return f.type.indexOf('image/') === 0; });
  processNextPhoto();
}
function processNextPhoto(){
  if(photoQueue.length === 0){
    closePhotoEditor();
    renderAttachStrip();
    return;
  }
  const file = photoQueue.shift();
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = function(){
    editorState = { img: img, rotation: 0, brightness: 0, contrast: 0, file: file, objectUrl: url };
    document.getElementById('editorBrightness').value = 0;
    document.getElementById('editorContrast').value = 0;
    redrawEditor();
    document.getElementById('photoEditOverlay').classList.add('show');
  };
  img.src = url;
}
function closePhotoEditor(){
  document.getElementById('photoEditOverlay').classList.remove('show');
  if(editorState && editorState.objectUrl) URL.revokeObjectURL(editorState.objectUrl);
  editorState = null;
}
function redrawEditor(){
  if(!editorState) return;
  const img = editorState.img;
  const rotation = editorState.rotation;
  const rad = rotation * Math.PI / 180;
  const swapped = rotation % 180 !== 0;
  const maxDim = 480;
  const scale = Math.min(1, maxDim / Math.max(img.naturalWidth, img.naturalHeight));
  const drawW = img.naturalWidth * scale;
  const drawH = img.naturalHeight * scale;
  const cw = swapped ? drawH : drawW;
  const ch = swapped ? drawW : drawH;

  const canvas = document.getElementById('editorCanvas');
  canvas.width = cw;
  canvas.height = ch;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,cw,ch);
  ctx.save();
  ctx.filter = 'brightness(' + (100+editorState.brightness) + '%) contrast(' + (100+editorState.contrast) + '%)';
  ctx.translate(cw/2, ch/2);
  ctx.rotate(rad);
  ctx.drawImage(img, -drawW/2, -drawH/2, drawW, drawH);
  ctx.restore();
}
document.getElementById('editorRotateLeft').addEventListener('click', function(){ editorState.rotation = (editorState.rotation + 270) % 360; redrawEditor(); });
document.getElementById('editorRotateRight').addEventListener('click', function(){ editorState.rotation = (editorState.rotation + 90) % 360; redrawEditor(); });
document.getElementById('editorBrightness').addEventListener('input', function(e){ editorState.brightness = Number(e.target.value); redrawEditor(); });
document.getElementById('editorContrast').addEventListener('input', function(e){ editorState.contrast = Number(e.target.value); redrawEditor(); });
document.getElementById('editorCancel').addEventListener('click', function(){
  photoQueue = [];
  closePhotoEditor();
  renderAttachStrip();
});
document.getElementById('editorSkip').addEventListener('click', function(){
  if(editorState && editorState.objectUrl) URL.revokeObjectURL(editorState.objectUrl);
  processNextPhoto();
});
document.getElementById('editorUse').addEventListener('click', function(){
  const canvas = document.getElementById('editorCanvas');
  const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
  const base64 = dataUrl.split(',')[1];
  attachments.push({
    name: editorState.file.name,
    mimeType: 'image/jpeg',
    kind: 'binary',
    data: base64,
    previewUrl: dataUrl
  });
  if(editorState.objectUrl) URL.revokeObjectURL(editorState.objectUrl);
  processNextPhoto();
});

function renderPlusMenu(){
  if(plusMode === 'main'){
    plusMenu.innerHTML =
      '<div class="plus-item" data-action="camera">📷<span>kamera</span></div>' +
      '<div class="plus-item" data-action="photo">🖼️<span>foto</span></div>' +
      '<div class="plus-item" data-action="file">📄<span>file</span></div>' +
      '<div class="plus-item" data-action="plugin">🧩<span>plugin</span></div>';
  } else {
    const items = PLUGIN_MENU.map(function(p){
      const action = p.type === 'mention' ? 'mention:' + p.cmd : 'mode:' + p.cmd;
      return '<div class="plus-item" data-action="' + action + '">' + p.icon + '<span>' + p.label + '</span></div>';
    }).join('');
    plusMenu.innerHTML = '<div class="plus-item back" data-action="back">← kembali</div>' + items;
  }
  plusMenu.querySelectorAll('.plus-item').forEach(function(el){
    el.addEventListener('click', function(ev){
      ev.stopPropagation();
      handlePlusAction(el.dataset.action);
    });
  });
}
function handlePlusAction(action){
  if(action === 'camera'){
    pickMode = 'camera';
    fileInput.setAttribute('capture', 'environment');
    fileInput.setAttribute('accept', 'image/*');
    fileInput.click();
    closePlusMenu();
  } else if(action === 'photo'){
    pickMode = 'photo';
    fileInput.removeAttribute('capture');
    fileInput.setAttribute('accept', 'image/*');
    fileInput.click();
    closePlusMenu();
  } else if(action === 'file'){
    pickMode = 'file';
    fileInput.removeAttribute('capture');
    fileInput.setAttribute('accept', '*/*');
    fileInput.click();
    closePlusMenu();
  } else if(action === 'plugin'){
    plusMode = 'plugin';
    renderPlusMenu();
  } else if(action === 'back'){
    plusMode = 'main';
    renderPlusMenu();
  } else if(action && action.indexOf('mention:') === 0){
    insertMention(action.split(':')[1]);
    closePlusMenu();
  } else if(action && action.indexOf('mode:') === 0){
    activateMode(action.split(':')[1]);
    closePlusMenu();
  }
}
function openPlusMenu(){ plusMode = 'main'; renderPlusMenu(); plusMenu.classList.add('show'); plusBtn.classList.add('active'); }
function closePlusMenu(){ plusMenu.classList.remove('show'); plusBtn.classList.remove('active'); }

plusBtn.addEventListener('click', function(e){
  e.stopPropagation();
  if(plusMenu.classList.contains('show')) closePlusMenu(); else openPlusMenu();
});
document.addEventListener('click', function(e){
  if(!plusMenu.contains(e.target) && e.target !== plusBtn) closePlusMenu();
  if(!mentionDropdown.contains(e.target) && e.target !== inputEl) mentionDropdown.classList.remove('show');
});

// ============================================================
// PARSING RESPONS PLUGIN (bentuk json belum pasti, jadi nyoba
// beberapa kemungkinan nama field sekaligus)
// ============================================================
function parseSearchResponse(json){
  if(typeof json === 'string') return { answer: json, sources: [] };
  const candidates = [json.message, json.result, json.answer, json.response, json.text,
    json.data && json.data.message, json.data && json.data.result, json.data && json.data.answer, json.data && json.data.text];
  let answer = candidates.find(function(c){ return typeof c === 'string' && c.trim().length; });
  if(!answer) answer = '```json\n' + JSON.stringify(json, null, 2) + '\n```';

  let rawSources = json.sources || json.links || json.references || json.results || (json.data && json.data.sources) || [];
  if(!Array.isArray(rawSources)) rawSources = [];
  const sources = rawSources.map(function(s){
    if(typeof s === 'string') return { title: s, url: s };
    return { title: s.title || s.name || s.snippet || s.url || s.link || 'sumber', url: s.url || s.link || s.href || '' };
  }).filter(function(s){ return s.url; });

  return { answer: answer, sources: sources };
}

function extractCodeFromText(text){
  if(typeof text !== 'string') return null;
  const match = text.match(/```(\w+)?\n([\s\S]*?)```/);
  if(match){
    return { language: match[1] || 'text', code: match[2], rest: text.replace(match[0], '').trim() };
  }
  return null;
}
function parseCoderResponse(json){
  if(typeof json === 'string') json = { message: json };
  const rawText = json.message || json.result || json.answer || json.response || json.text || (json.data && json.data.message) || '';
  const extracted = extractCodeFromText(rawText);
  if(extracted){
    return { code: extracted.code, language: extracted.language, explanation: extracted.rest };
  }
  const code = json.code || (json.data && json.data.code) || json.output || '';
  if(code){
    return { code: typeof code === 'string' ? code : JSON.stringify(code, null, 2), language: json.language || json.lang || 'text', explanation: typeof rawText === 'string' ? rawText : '' };
  }
  return { code: JSON.stringify(json, null, 2), language: 'json', explanation: 'format respons plugin coder belum dikenalin, ini raw response-nya:' };
}

function parseEditResponse(json){
  if(typeof json === 'string') return { imageUrl: null, caption: json };
  // kasus 1: server udah konversi gambar ke base64 data URL (API balikin binary image)
  const dataUrl = json.imageDataUrl || (json.data && json.data.imageDataUrl);
  if(dataUrl) return { imageUrl: dataUrl, caption: '' };
  // kasus 2: API balikin url gambar dalam JSON
  const candidates = [json.url, json.result, json.image, json.output,
    json.data && json.data.url, json.data && json.data.image];
  const imageUrl = candidates.find(function(c){ return typeof c === 'string' && c.trim().length; });
  const caption = json.message || json.caption || json.description || '';
  return { imageUrl: imageUrl || null, caption: typeof caption === 'string' ? caption : '' };
}

// ============================================================
// SEND — normal (gemini) / @search / @edit / mode code
// ============================================================
async function runSearchPlugin(originalText, query){
  addBubble('user', originalText, false);
  history.push({ role:'user', parts:[{ text: originalText }] });
  renderInput('', 0);
  sendBtn.disabled = true;
  hudCount.textContent = history.filter(function(h){ return h.role==='user'; }).length;
  showTyping();

  try{
    const res = await fetch(SEARCH_ENDPOINT + '?message=' + encodeURIComponent(query) + '&model=think-deeper');
    const data = await res.json();
    hideTyping();

    if(!res.ok){
      addSystemLine('[error] plugin search gagal — ' + (data && data.error && data.error.message || res.status), true);
      history.pop();
      return;
    }
    const parsed = parseSearchResponse(data);
    addSearchBubble(parsed.answer, parsed.sources);
    history.push({ role:'model', parts:[{ text: parsed.answer }] });
  }catch(err){
    hideTyping();
    addSystemLine('[error] plugin search gagal — ' + err.message, true);
    history.pop();
  }finally{
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

async function runCoderPlugin(prompt){
  if(!prompt){ addSystemLine('[system] ketik dulu kode apa yang mau dibikin', true); return; }
  addBubble('user', prompt, false);
  history.push({ role:'user', parts:[{ text: prompt }] });
  renderInput('', 0);
  sendBtn.disabled = true;
  hudCount.textContent = history.filter(function(h){ return h.role==='user'; }).length;
  showTyping();

  try{
    const res = await fetch(CODER_ENDPOINT + '?prompt=' + encodeURIComponent(prompt) + '&session=' + encodeURIComponent(codeSession || ''));
    const data = await res.json();
    hideTyping();

    if(!res.ok){
      addSystemLine('[error] plugin coder gagal — ' + (data && data.error && data.error.message || res.status), true);
      history.pop();
      return;
    }
    if(data.session) codeSession = data.session;
    const parsed = parseCoderResponse(data);
    addCoderBubble(parsed.explanation, parsed.code, parsed.language);
    history.push({ role:'model', parts:[{ text: parsed.explanation || ('kode ' + parsed.language + ' udah dibikin') }] });
  }catch(err){
    hideTyping();
    addSystemLine('[error] plugin coder gagal — ' + err.message, true);
    history.pop();
  }finally{
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

async function runEditPlugin(originalText, prompt, imageAttachment){
  const row = addBubble('user', originalText, false);
  if(imageAttachment.previewUrl){
    const img = document.createElement('img');
    img.src = imageAttachment.previewUrl;
    img.style.maxWidth = '160px';
    img.style.borderRadius = '9px';
    img.style.marginTop = '6px';
    img.style.display = 'block';
    row.querySelector('.bubble').appendChild(img);
  }
  history.push({ role:'user', parts:[{ text: originalText }] });
  renderInput('', 0);
  attachments = attachments.filter(function(a){ return a !== imageAttachment; });
  renderAttachStrip();
  sendBtn.disabled = true;
  hudCount.textContent = history.filter(function(h){ return h.role==='user'; }).length;
  addSystemLine('[system] upload foto & proses edit, tunggu bentar...');
  showTyping();

  try{
    const res = await fetch(EDIT_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ imageBase64: imageAttachment.data, mimeType: imageAttachment.mimeType, prompt: prompt })
    });
    const data = await res.json();
    hideTyping();

    if(!res.ok){
      const msg = (data && data.error && data.error.message) || res.status;
      addSystemLine('[error] plugin edit gagal — ' + msg, true);
      if(data && data.uploadedUrl){
        addSystemLine('[system] tapi foto lo udah keupload ke: ' + data.uploadedUrl);
      }
      history.pop();
      return;
    }
    const parsed = parseEditResponse(data);
    addEditResultBubble(parsed);
    history.push({ role:'model', parts:[{ text: parsed.caption || 'hasil edit foto udah jadi' }] });
  }catch(err){
    hideTyping();
    addSystemLine('[error] plugin edit gagal — ' + err.message, true);
    history.pop();
  }finally{
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

async function sendMessage(){
  const raw = getPlainText(inputEl).trim();
  if(!raw && attachments.length === 0) return;

  if(activeMode === 'code'){
    await runCoderPlugin(raw);
    return;
  }

  const editMatch = raw.match(/^@edit\s+([\s\S]+)/i);
  if(editMatch){
    const imageAtt = attachments.find(function(a){ return a.mimeType && a.mimeType.indexOf('image/') === 0; });
    if(!imageAtt){
      addSystemLine('[system] buat edit foto, attach/kirim fotonya dulu (pencet + > foto), abis itu ketik @edit diikuti instruksinya. contoh: @edit ubah jadi malam', true);
      return;
    }
    await runEditPlugin(raw, editMatch[1].trim(), imageAtt);
    return;
  }
  if(/^@edit\s*$/i.test(raw)){
    addSystemLine('[system] abis @edit ketik instruksinya, contoh: @edit ubah jadi malam (jangan lupa attach fotonya dulu)', true);
    return;
  }

  const searchMatch = raw.match(/^@search\s+([\s\S]+)/i);
  if(searchMatch){
    await runSearchPlugin(raw, searchMatch[1].trim());
    return;
  }
  if(/^@search\s*$/i.test(raw)){
    addSystemLine('[system] abis @search ketik query-nya, contoh: @search skor timnas hari ini', true);
    return;
  }

  const parts = [];
  if(raw) parts.push({ text: raw });
  attachments.forEach(function(a){
    if(a.kind === 'text'){
      parts.push({ text: 'berikut isi file "' + a.name + '":\n```\n' + a.textContent + '\n```' });
    } else {
      parts.push({ inlineData: { mimeType: a.mimeType, data: a.data } });
    }
  });

  const row = addBubble('user', raw || '(kirim file)', false);
  if(attachments.length){
    const wrap = document.createElement('div');
    attachments.forEach(function(a){
      if(a.previewUrl){
        const img = document.createElement('img');
        img.src = a.previewUrl;
        img.style.maxWidth = '160px';
        img.style.borderRadius = '9px';
        img.style.marginTop = '6px';
        img.style.display = 'block';
        wrap.appendChild(img);
      } else if(a.kind === 'text'){
        const chip = document.createElement('div');
        chip.style.fontFamily = "'JetBrains Mono', monospace";
        chip.style.fontSize = '11px';
        chip.style.color = 'var(--muted)';
        chip.style.marginTop = '6px';
        chip.textContent = '📝 ' + a.name;
        wrap.appendChild(chip);
      }
    });
    row.querySelector('.bubble').appendChild(wrap);
  }

  history.push({ role:'user', parts: parts });
  renderInput('', 0);
  attachments = [];
  renderAttachStrip();
  sendBtn.disabled = true;
  hudCount.textContent = history.filter(function(h){ return h.role==='user'; }).length;
  showTyping();

  try{
    const res = await fetch(CHAT_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: MODEL,
        systemInstruction: SYSTEM_PROMPT,
        contents: history,
        generationConfig: { temperature: 0.9, maxOutputTokens: MAX_OUTPUT_TOKENS }
      })
    });

    const data = await res.json();
    hideTyping();

    if(!res.ok){
      const msg = (data && data.error && data.error.message) || ('http ' + res.status);
      addSystemLine('[error] gagal connect ke backend — ' + msg, true);
      history.pop();
      return;
    }

    const reply = (data.candidates && data.candidates[0] && data.candidates[0].content &&
                   data.candidates[0].content.parts && data.candidates[0].content.parts.map(function(p){ return p.text; }).filter(Boolean).join(''))
                  || '[kosong — kena filter atau candidate abis]';
    addBubble('bot', reply, true);
    history.push({ role:'model', parts:[{ text: reply }] });

  }catch(err){
    hideTyping();
    addSystemLine('[error] request gagal — ' + err.message, true);
    history.pop();
  }finally{
    sendBtn.disabled = false;
    inputEl.focus();
  }
}
