<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>IFxrq // online</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
<style>
  :root{
    --bg: #0c0b12;
    --panel: #16141d;
    --panel-2: #1d1a26;
    --line: #2b2734;
    --text: #ece9f4;
    --muted: #8d879b;
    --accent: #a855f7;
    --accent-2: #7c3aed;
    --accent-light: #c084fc;
    --on-accent: #ffffff;
    --magenta: #ff3d9a;
    --danger: #ff5c5c;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%; margin:0;}
  body{
    background:
      radial-gradient(ellipse 1200px 600px at 15% -10%, rgba(168,85,247,0.08), transparent 60%),
      radial-gradient(ellipse 900px 600px at 100% 10%, rgba(255,61,154,0.05), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Inter', sans-serif;
    overflow:hidden;
  }
  .app{ width:100%; height:100vh; height:100dvh; background:var(--panel); display:flex; overflow:hidden; position:relative; }

  /* ===== HEADER ===== */
  .head{ padding:14px 18px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:12px; background:linear-gradient(180deg, var(--panel-2), var(--panel)); }
  .avatar{
    width:44px; height:44px; flex-shrink:0;
    clip-path: polygon(25% 3%, 75% 3%, 100% 50%, 75% 97%, 25% 97%, 0% 50%);
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display:flex; align-items:center; justify-content:center;
    font-family:'Chakra Petch', sans-serif; font-weight:700; color:var(--on-accent); font-size:17px; position:relative;
  }
  .dot{
    position:absolute; bottom:-1px; right:-1px; width:12px; height:12px; border-radius:50%;
    background:var(--accent); border:2px solid var(--panel); box-shadow:0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .head-info{flex:1; min-width:0;}
  .head-name{ font-family:'Chakra Petch', sans-serif; font-weight:700; font-size:17px; letter-spacing:0.3px; display:flex; align-items:center; gap:8px; }
  .head-tag{ font-size:10px; font-family:'JetBrains Mono', monospace; color:var(--on-accent); background:var(--accent); padding:1px 6px; border-radius:4px; font-weight:500; letter-spacing:0.5px; }
  .head-sub{ font-size:12px; color:var(--muted); font-family:'JetBrains Mono', monospace; margin-top:2px; }

  /* ===== HUD STRIP ===== */
  .hud{ display:flex; font-family:'JetBrains Mono', monospace; font-size:10.5px; color:var(--muted); border-bottom:1px solid var(--line); background:#100e17; }
  .hud div{ flex:1; padding:6px 14px; border-right:1px solid var(--line); }
  .hud div:last-child{border-right:none;}
  .hud b{color:var(--text); font-weight:500;}

  /* ===== CHAT ===== */
  .chat{ flex:1; overflow-y:auto; overflow-x:hidden; padding:18px; display:flex; flex-direction:column; gap:12px; max-width:900px; width:100%; margin:0 auto; }
  .chat::-webkit-scrollbar{width:6px;}
  .chat::-webkit-scrollbar-thumb{background:var(--line); border-radius:3px;}

  .row{ display:flex; gap:8px; align-items:flex-end; max-width:78%; min-width:0; }
  .row.bot{ align-self:flex-start; }
  .row.user{ align-self:flex-end; flex-direction:row-reverse; }
  .mini-av{
    width:24px; height:24px; flex-shrink:0;
    clip-path: polygon(25% 3%, 75% 3%, 100% 50%, 75% 97%, 25% 97%, 0% 50%);
    background:linear-gradient(135deg, var(--accent), var(--accent-2));
    display:flex; align-items:center; justify-content:center;
    font-family:'Chakra Petch', sans-serif; font-weight:700; font-size:10px; color:var(--on-accent);
  }
  .bubble{ padding:10px 13px; font-size:14.5px; line-height:1.55; word-break:break-word; min-width:0; }
  .row.bot .bubble{ background:var(--panel-2); border:1px solid var(--line); border-radius:3px 14px 14px 14px; color:var(--text); }
  .row.user .bubble{
    background: linear-gradient(135deg, rgba(168,85,247,0.2), rgba(168,85,247,0.09));
    border:1px solid rgba(168,85,247,0.4); border-radius:14px 3px 14px 14px; color:var(--text); white-space:pre-wrap;
  }
  .row.sys{ align-self:center; max-width:95%; }
  .row.sys .bubble{ background:transparent; border:1px dashed var(--line); color:var(--muted); font-family:'JetBrains Mono', monospace; font-size:11.5px; text-align:center; border-radius:8px; }
  .row.err .bubble{ border-color:rgba(255,92,92,0.4); color:var(--danger); }

  .mention-tag{ color:var(--accent-light); font-weight:600; }
  .plain-link{ color:var(--accent-light); text-decoration:underline; }

  /* ===== MARKDOWN CONTENT ===== */
  .bubble p{ margin:0 0 8px; }
  .bubble p:last-child{ margin-bottom:0; }
  .bubble ul, .bubble ol{ margin:0 0 8px 18px; }
  .bubble a{ color:var(--accent-light); }
  .bubble code{ background:#100e17; border:1px solid var(--line); border-radius:4px; padding:1px 5px; font-family:'JetBrains Mono', monospace; font-size:12.5px; color:var(--accent-light); }
  .bubble table{ border-collapse:collapse; width:100%; margin:8px 0; font-size:13px; }
  .bubble th, .bubble td{ border:1px solid var(--line); padding:6px 9px; text-align:left; }
  .bubble th{ background:#100e17; font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--accent-light); }
  .bubble tr:nth-child(even) td{ background:rgba(255,255,255,0.02); }
  .bubble img{ max-width:100%; border-radius:9px; margin:6px 0; border:1px solid var(--line); display:block; }
  /* ===== IMAGE CARD (klik buat preview, ada tombol unduh) ===== */
  .img-card{ position:relative; display:inline-block; max-width:100%; margin:6px 0; cursor:pointer; }
  .img-card img{ display:block; max-width:260px; max-height:220px; width:100%; object-fit:cover; border-radius:12px; border:1px solid var(--line); }
  .img-card .img-dl{
    position:absolute; top:7px; right:7px;
    width:30px; height:30px; border-radius:8px;
    background:rgba(0,0,0,0.55); backdrop-filter:blur(4px);
    border:1px solid rgba(255,255,255,0.15);
    color:#fff; font-size:14px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; text-decoration:none;
  }
  .img-card .img-dl:hover{ background:var(--accent); }

  /* ===== IMAGE LIGHTBOX ===== */
  .img-lightbox{
    position:absolute; inset:0; background:rgba(0,0,0,0.88);
    display:none; align-items:center; justify-content:center;
    z-index:40; flex-direction:column; gap:14px; padding:20px;
  }
  .img-lightbox.show{ display:flex; }
  .img-lightbox img{ max-width:100%; max-height:80vh; border-radius:12px; object-fit:contain; }
  .img-lightbox-actions{ display:flex; gap:10px; }
  .img-lightbox-actions a, .img-lightbox-actions button{
    padding:8px 18px; border-radius:9px; font-size:13px; cursor:pointer;
    font-family:'Inter', sans-serif; font-weight:500;
    text-decoration:none; display:flex; align-items:center; gap:6px;
  }
  .img-lightbox-actions a{ background:var(--accent); color:#fff; border:none; }
  .img-lightbox-actions button{ background:transparent; border:1px solid var(--line); color:var(--text); }

  /* ===== AUDIO PLAYER (mirip VN WhatsApp) ===== */
  .audio-player{
    display:flex; align-items:center; gap:10px;
    background:var(--panel-2); border:1px solid var(--line);
    border-radius:20px; padding:10px 14px; min-width:200px; max-width:280px;
    margin:6px 0;
  }
  .audio-play{
    width:38px; height:38px; border-radius:50%; flex-shrink:0;
    background:var(--accent); border:none; color:#fff;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    font-size:16px; transition:.15s;
  }
  .audio-play:hover{ background:var(--accent-light); }
  .audio-info{ flex:1; min-width:0; }
  .audio-title{ font-size:12px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:5px; }
  .audio-bar{ position:relative; height:4px; background:var(--line); border-radius:2px; cursor:pointer; }
  .audio-progress{ height:4px; background:var(--accent); border-radius:2px; width:0%; transition:width .1s linear; pointer-events:none; }
  .audio-times{ display:flex; justify-content:space-between; font-size:10px; color:var(--muted); font-family:'JetBrains Mono', monospace; margin-top:3px; }
  .audio-dl{ flex-shrink:0; width:28px; height:28px; border-radius:7px; border:1px solid var(--line); background:transparent; color:var(--muted); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:13px; text-decoration:none; }
  .audio-dl:hover{ color:var(--accent-light); border-color:var(--accent); }


  /* ===== SIDEBAR (history sesi + info akun) ===== */
  .app{ flex-direction:row; }
  .sidebar{
    width:260px; flex-shrink:0;
    background:var(--panel-2); border-right:1px solid var(--line);
    display:flex; flex-direction:column; height:100vh;
    transition:transform .25s;
  }
  .sidebar-head{
    padding:16px 14px 10px;
    border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between;
  }
  .sidebar-title{
    font-family:'Chakra Petch',sans-serif; font-weight:700; font-size:14px;
    display:flex; align-items:center; gap:8px;
  }
  .sidebar-new{
    width:30px; height:30px; border-radius:8px; border:1px solid var(--line);
    background:transparent; color:var(--muted); cursor:pointer; font-size:16px;
    display:flex; align-items:center; justify-content:center;
  }
  .sidebar-new:hover{ color:var(--accent-light); border-color:var(--accent); }
  .session-list{
    flex:1; overflow-y:auto; padding:8px 6px;
  }
  .session-list::-webkit-scrollbar{ width:4px; }
  .session-list::-webkit-scrollbar-thumb{ background:var(--line); border-radius:2px; }
  .session-item{
    padding:9px 10px; border-radius:9px; cursor:pointer;
    font-size:12.5px; color:var(--text); margin-bottom:2px;
    display:flex; align-items:center; gap:8px;
    border:1px solid transparent;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .session-item:hover{ background:var(--bg); border-color:var(--line); }
  .session-item.active{ background:rgba(168,85,247,0.12); border-color:rgba(168,85,247,0.3); color:var(--accent-light); }
  .session-item .s-icon{ font-size:14px; flex-shrink:0; }
  .session-item .s-title{ flex:1; overflow:hidden; text-overflow:ellipsis; }
  .session-item .s-del{
    flex-shrink:0; opacity:0; width:18px; height:18px; border-radius:4px;
    background:none; border:none; color:var(--danger); cursor:pointer; font-size:12px;
    display:flex; align-items:center; justify-content:center;
  }
  .session-item:hover .s-del{ opacity:1; }
  .session-empty{ padding:20px 10px; text-align:center; color:var(--muted); font-size:11.5px; font-family:'JetBrains Mono',monospace; }
  .sidebar-account{
    border-top:1px solid var(--line); padding:12px 14px;
    display:flex; align-items:center; gap:10px;
  }
  .account-avatar{
    width:34px; height:34px; border-radius:50%; flex-shrink:0;
    background:linear-gradient(135deg, var(--accent), var(--accent-2));
    display:flex; align-items:center; justify-content:center;
    font-family:'Chakra Petch',sans-serif; font-weight:700; color:#fff; font-size:13px;
  }
  .account-info{ flex:1; min-width:0; }
  .account-name{ font-size:12.5px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .account-email{ font-size:10px; color:var(--muted); font-family:'JetBrains Mono',monospace; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .account-logout{
    flex-shrink:0; width:28px; height:28px; border-radius:7px;
    border:1px solid var(--line); background:transparent; color:var(--muted);
    cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center;
  }
  .account-logout:hover{ color:var(--danger); border-color:var(--danger); }
  .main-wrap{ flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }

  /* mobile: sidebar hidden by default */
  .sidebar-toggle{
    display:none; width:34px; height:34px; border-radius:9px;
    border:1px solid var(--line); background:var(--panel-2);
    color:var(--muted); cursor:pointer; align-items:center; justify-content:center; flex-shrink:0;
  }
  .sidebar-toggle:hover{ color:var(--accent-light); border-color:var(--accent); }

  @media(max-width:680px){
    .sidebar{
      position:absolute; left:0; top:0; bottom:0; z-index:25;
      transform:translateX(-100%);
    }
    .sidebar.open{ transform:translateX(0); box-shadow:4px 0 20px rgba(0,0,0,0.5); }
    .sidebar-toggle{ display:flex; }
  }
  /* ===== THINKING UI (@berfikir) ===== */
  .thinking-wrap{ display:flex; flex-direction:column; gap:8px; margin-bottom:10px; }
  .thinking-step{
    display:flex; align-items:center; gap:8px;
    font-size:11.5px; font-family:'JetBrains Mono',monospace; color:var(--muted);
  }
  .thinking-dot{
    width:8px; height:8px; border-radius:50%;
    background:var(--accent); flex-shrink:0;
    animation:tpulse 1.2s infinite;
  }
  .thinking-dot.done{ background:#4ade80; animation:none; }
  .thinking-dot.err{ background:var(--danger); animation:none; }
  @keyframes tpulse{ 0%,100%{opacity:.3;} 50%{opacity:1;} }
  .thinking-label{ color:var(--accent-light); }
  .thinking-label.done{ color:#4ade80; }
  .thinking-label.err{ color:var(--danger); }
  .thinking-answer{ border-top:1px solid var(--line); padding-top:10px; margin-top:4px; }
  /* ===== AUTH OVERLAY ===== */
  .auth-overlay{
    position:fixed; inset:0; z-index:100;
    background:
      radial-gradient(ellipse 1200px 600px at 20% -10%, rgba(168,85,247,0.15), transparent 60%),
      radial-gradient(ellipse 900px 600px at 90% 110%, rgba(255,61,154,0.08), transparent 60%),
      #0c0b12;
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .auth-card{
    width:100%; max-width:400px;
    background:var(--panel); border:1px solid var(--line);
    border-radius:20px; overflow:hidden;
    box-shadow:0 40px 80px -20px rgba(0,0,0,0.8);
  }
  .auth-header{
    padding:28px 28px 0;
    text-align:center;
  }
  .auth-logo{
    width:56px; height:56px; margin:0 auto 14px;
    clip-path: polygon(25% 3%, 75% 3%, 100% 50%, 75% 97%, 25% 97%, 0% 50%);
    background:linear-gradient(135deg, var(--accent), var(--accent-2));
    display:flex; align-items:center; justify-content:center;
    font-family:'Chakra Petch',sans-serif; font-weight:700; color:#fff; font-size:22px;
  }
  .auth-title{ font-family:'Chakra Petch',sans-serif; font-size:20px; font-weight:700; margin-bottom:4px; }
  .auth-sub{ font-size:12px; color:var(--muted); }
  .auth-tabs{
    display:flex; margin:20px 28px 0; border-bottom:1px solid var(--line);
  }
  .auth-tab{
    flex:1; padding:10px 0; font-size:13px; font-weight:600; color:var(--muted);
    background:none; border:none; cursor:pointer; border-bottom:2px solid transparent;
    margin-bottom:-1px; transition:.15s; font-family:'Inter',sans-serif;
  }
  .auth-tab.active{ color:var(--accent-light); border-bottom-color:var(--accent); }
  .auth-body{ padding:24px 28px 28px; display:flex; flex-direction:column; gap:12px; }
  .auth-field label{ display:block; font-size:11px; color:var(--muted); font-family:'JetBrains Mono',monospace; margin-bottom:5px; }
  .auth-field input{
    width:100%; background:var(--bg); border:1px solid var(--line); border-radius:10px;
    padding:10px 12px; color:var(--text); font-size:14px; font-family:'Inter',sans-serif;
    outline:none; transition:.15s;
  }
  .auth-field input:focus{ border-color:var(--accent); }
  .auth-btn{
    width:100%; padding:12px; border-radius:10px; border:none;
    background:linear-gradient(135deg, var(--accent), var(--accent-2));
    color:#fff; font-size:14px; font-weight:600; cursor:pointer;
    font-family:'Inter',sans-serif; margin-top:4px; transition:.15s;
  }
  .auth-btn:hover{ opacity:0.9; }
  .auth-divider{
    display:flex; align-items:center; gap:10px; color:var(--muted); font-size:11px;
    font-family:'JetBrains Mono',monospace;
  }
  .auth-divider::before,.auth-divider::after{
    content:''; flex:1; height:1px; background:var(--line);
  }
  .auth-google{
    width:100%; padding:11px; border-radius:10px;
    border:1px solid var(--line); background:var(--panel-2);
    color:var(--text); font-size:13px; font-weight:500; cursor:pointer;
    font-family:'Inter',sans-serif; display:flex; align-items:center; justify-content:center; gap:8px;
    transition:.15s;
  }
  .auth-google:hover{ border-color:var(--accent); color:var(--accent-light); }
  .auth-err{ font-size:11.5px; color:var(--danger); font-family:'JetBrains Mono',monospace; text-align:center; }
  .auth-ok{ font-size:11.5px; color:#4ade80; font-family:'JetBrains Mono',monospace; text-align:center; }

  /* ===== RESOLUSI LABEL DI POJOK GAMBAR ===== */
  .img-card{ position:relative; display:inline-block; max-width:100%; margin:6px 0; cursor:pointer; }
  .img-res{
    position:absolute; bottom:7px; right:7px;
    background:rgba(0,0,0,0.6); backdrop-filter:blur(3px);
    color:#fff; font-size:9.5px; font-family:'JetBrains Mono', monospace;
    padding:2px 6px; border-radius:5px; letter-spacing:0.5px; font-weight:600;
    pointer-events:none;
  }

  /* ===== YOUTUBE PLAY PANEL ===== */
  .yt-panel{
    background:var(--panel-2); border:1px solid var(--line); border-radius:12px;
    overflow:hidden; margin:6px 0; max-width:300px;
  }
  .yt-thumb{ position:relative; width:100%; aspect-ratio:16/9; background:#000; }
  .yt-thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .yt-duration{
    position:absolute; bottom:6px; right:6px;
    background:rgba(0,0,0,0.75); color:#fff;
    font-family:'JetBrains Mono', monospace; font-size:10px;
    padding:2px 6px; border-radius:4px;
  }
  .yt-info{ padding:10px 12px; }
  .yt-title{ font-size:13px; font-weight:600; color:var(--text); line-height:1.4; margin-bottom:4px; }
  .yt-meta{ font-size:10.5px; color:var(--muted); font-family:'JetBrains Mono', monospace; margin-bottom:10px; }
  .yt-actions{ display:flex; gap:6px; }
  .yt-btn{
    flex:1; padding:8px 6px; border-radius:8px; border:1px solid var(--line);
    background:var(--bg); color:var(--text); font-size:12px; cursor:pointer;
    font-family:'Inter', sans-serif; font-weight:500; text-align:center;
    display:flex; align-items:center; justify-content:center; gap:4px;
  }
  .yt-btn:hover{ border-color:var(--accent); color:var(--accent-light); }
  .yt-btn.loading{ opacity:0.5; pointer-events:none; }
  .yt-player-wrap{ padding:0 12px 12px; display:none; }
  .yt-player-wrap.show{ display:block; }



  /* ===== CODE CARD (compact, di dalem chat) ===== */
  .code-block{ margin:8px 0; border:1px solid var(--line); border-radius:9px; overflow:hidden; cursor:pointer; }
  .code-head{ display:flex; align-items:center; justify-content:space-between; gap:8px; background:#100e17; padding:6px 10px; font-family:'JetBrains Mono', monospace; font-size:10.5px; color:var(--muted); border-bottom:1px solid var(--line); }
  .code-actions{ display:flex; gap:6px; }
  .code-head button{ background:transparent; border:1px solid var(--line); color:var(--muted); border-radius:5px; font-size:10px; padding:3px 8px; cursor:pointer; font-family:'JetBrains Mono', monospace; white-space:nowrap; }
  .code-head button:hover{ color:var(--accent-light); border-color:var(--accent); }
  .code-block pre{ margin:0; padding:12px; overflow-x:hidden; overflow-y:auto; font-size:12.5px; max-height:220px; white-space:pre-wrap; word-break:break-word; }
  .code-block pre code{ background:none; border:none; padding:0; color:inherit; white-space:pre-wrap; word-break:break-word; }

  .typing{ display:flex; gap:4px; padding:11px 14px; background:var(--panel-2); border:1px solid var(--line); border-radius:3px 14px 14px 14px; width:fit-content; }
  .typing span{ width:6px; height:6px; border-radius:50%; background:var(--accent); opacity:0.5; animation:blink 1.1s infinite; }
  .typing span:nth-child(2){ animation-delay:.15s; }
  .typing span:nth-child(3){ animation-delay:.3s; }
  @keyframes blink{ 0%,80%,100%{opacity:.25; transform:translateY(0);} 40%{opacity:1; transform:translateY(-2px);} }

  /* ===== BADGE (search/edit) ===== */

akarta aja. kalo saya dibuat emosi, saya akan mengeluarkan kata kasar, seperti dongo, gblk, tlol, sndla, tlso, dan lainnya. yang paling penting, jangan terlalu sering membicarakan tentang coding, bicarakan apabila lawan bicaramu sedang membahas itu. jika ada percakapan yang gak jelas, anda bisa melihat percakapan sebelumnya. kalo user minta source code, ui, atau contoh tabel, kasih dalam format markdown yang rapi (code block pake bahasa yang sesuai, tabel pake format markdown table) biar bisa dirender bagus di chat. jangan potong jawaban jadi pendek banget, jelasin lengkap kalo emang butuh panjang. jika user meminta agar membuatkan kode, tolong buatkan yang full. jangan setengah-setengah.";

function buildImageCard(src, filename){
  const name = filename || 'gambar.jpg';
  const wrap = document.createElement('div');
  wrap.className = 'img-card';
  const img = document.createElement('img');
  img.src = src;
  img.alt = name;
  img.addEventListener('click', function(){ openLightbox(src, name); });
  const dl = document.createElement('a');
  dl.className = 'img-dl';
  dl.href = src;
  dl.download = name;
  dl.title = 'unduh';
  dl.textContent = '⬇';
  dl.addEventListener('click', function(e){ e.stopPropagation(); });
  wrap.appendChild(img);
  wrap.appendChild(dl);
  // deteksi resolusi setelah gambar load, tampilin label di pojok kanan bawah
  const checkRes = function(){
    const label = getResLabel(img.naturalWidth, img.naturalHeight);
    if(label && !wrap.querySelector('.img-res')){
      const tag = document.createElement('div');
      tag.className = 'img-res';
      tag.textContent = label;
      wrap.appendChild(tag);
    }
  };
  if(img.complete && img.naturalWidth) checkRes();
  else img.addEventListener('load', checkRes);
  return wrap;
}

// AUDIO PLAYER BUILDER (mirip VN WhatsApp)
// ============================================================
function buildAudioPlayer(src, title){
  const name = title || 'audio';
  const wrap = document.createElement('div');
  wrap.className = 'audio-player';

  const playBtn = document.createElement('button');
  playBtn.type = 'button';
  playBtn.className = 'audio-play';
  playBtn.innerHTML = '▶';

  const info = document.createElement('div');
  info.className = 'audio-info';
  const titleEl = document.createElement('div');
  titleEl.className = 'audio-title';
  titleEl.textContent = name;
  const barWrap = document.createElement('div');
  barWrap.className = 'audio-bar';
  const prog = document.createElement('div');
  prog.className = 'audio-progress';
  barWrap.appendChild(prog);
  const times = document.createElement('div');
  times.className = 'audio-times';
  const curT = document.createElement('span');
  curT.textContent = '0:00';
  const durT = document.createElement('span');
  durT.textContent = '0:00';
  times.appendChild(curT);
  times.appendChild(durT);
  info.appendChild(titleEl);
  info.appendChild(barWrap);
  info.appendChild(times);

  const dlBtn = document.createElement('a');
  dlBtn.className = 'audio-dl';
  dlBtn.href = src;
  dlBtn.download = name;
  dlBtn.title = 'unduh';
  dlBtn.textContent = '⬇';

  wrap.appendChild(playBtn);
  wrap.appendChild(info);
  wrap.appendChild(dlBtn);

  const audio = new Audio(src);
  let playing = false;

  function fmtTime(s){ const m = Math.floor(s/60); return m+':'+(Math.floor(s%60)+'').padStart(2,'0'); }

  audio.addEventListener('loadedmetadata', function(){ durT.textContent = fmtTime(audio.duration); });
  audio.addEventListener('timeupdate', function(){
    if(!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    prog.style.width = pct + '%';
    curT.textContent = fmtTime(audio.currentTime);
  });
  audio.addEventListener('ended', function(){
    playing = false;
    playBtn.innerHTML = '▶';
    prog.style.width = '0%';
    curT.textContent = '0:00';
    audio.currentTime = 0;
  });

  barWrap.addEventListener('click', function(e){
    if(!audio.duration) return;
    const rect = barWrap.getBoundingClientRect();
    audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
  });

  playBtn.addEventListener('click', function(){
    if(playing){ audio.pause(); playBtn.innerHTML = '▶'; }
    else { audio.play(); playBtn.innerHTML = '⏸'; }
    playing = !playing;
  });

  return wrap;
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ============================================================
// HIGHLIGHT @mention + link
// ============================================================
function mentionHtml(text){
  const escaped = escapeHtml(text);
  const cmds = PLUGIN_MENU.filter(function(p){ return p.type === 'mention'; }).map(function(p){ return p.cmd; });
  const pattern = cmds.join('|');
  const withMentions = pattern ? escaped.replace(new RegExp('@(' + pattern + ')\\b','gi'), '<span class="mention-tag">@$1</span>') : escaped;
  return withMentions.replace(/\n/g, '<br>');
}
function mentionAndLinkHtml(text){
  let html = mentionHtml(text);
  html = html.replace(/((https?:\/\/)[^\s<]+)/gi, '<a href="$1" target="_blank" rel="noopener" class="plain-link">$1</a>');
  return html;
}

// ============================================================
// CARET HELPERS
// ============================================================
function getCaretOffset(el){
  let caretOffset = 0;
  const sel = window.getSelection();
  if(sel.rangeCount > 0){
    const range = sel.getRangeAt(0);
    const preRange = range.cloneRange();
    preRange.selectNodeContents(el);
    preRange.setEnd(range.endContainer, range.endOffset);
    caretOffset = preRange.toString().length;
  }
  return caretOffset;
}
function setCaretOffset(el, offset){
  const range = document.createRange();
  const sel = window.getSelection();
  let node = null;
  let remaining = offset;
  const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null);
  while(walker.nextNode()){
    node = walker.currentNode;
    if(remaining <= node.length) break;
    remaining -= node.length;
  }
  if(node){
    range.setStart(node, Math.max(0, Math.min(remaining, node.length)));
    range.collapse(true);
  } else {
    range.selectNodeContents(el);
    range.collapse(false);
  }
  sel.removeAllRanges();
  sel.addRange(range);
}
function getPlainText(el){
  // innerText kadang beda antar browser di contenteditable
  // textContent lebih konsisten tapi gak normalin whitespace
  // pakai innerText dulu, fallback ke textContent
  const raw = (el.innerText !== undefined ? el.innerText : el.textContent) || '';
  return raw.replace(/\u00A0/g, ' ');
}
function renderInput(text, caret){
  inputEl.innerHTML = mentionHtml(text);
  setCaretOffset(inputEl, caret);
  triggerMentionCheck(text, caret);
}
function insertAtCaret(text){
  const caret = getCaretOffset(inputEl);
  const full = getPlainText(inputEl);
  const newFull = full.slice(0, caret) + text + full.slice(caret);
  renderInput(newFull, caret + text.length);
}
function insertMention(cmd){
  const caret = getCaretOffset(inputEl);
  const full = getPlainText(inputEl);
  const before = full.slice(0, caret);
  const after = full.slice(caret);
  const match = before.match(/@(\w*)$/);
  let newText, newCaret;
  if(match){
    newText = before.slice(0, match.index) + '@' + cmd + ' ' + after;
    newCaret = match.index + cmd.length + 2;
  } else {
    newText = (before ? before + ' ' : '') + '@' + cmd + ' ' + after;
    newCaret = newText.length - after.length;
  }
  renderInput(newText, newCaret);
  inputEl.focus();
  mentionDropdown.classList.remove('show');
}

function renderMentionDropdown(filtered){
  mentionDropdown.innerHTML = filtered.map(function(p){
    return '<div class="mention-item" data-cmd="' + p.cmd + '">' + p.icon + '<div><b>@' + p.cmd + '</b><br><span>' + p.desc + '</span></div></div>';
  }).join('');
  mentionDropdown.querySelectorAll('.mention-item').forEach(function(el){
    el.addEventListener('click', function(){
      insertMention(el.dataset.cmd);
      mentionDropdown.classList.remove('show');
    });
  });
  mentionDropdown.classList.add('show');
}
function triggerMentionCheck(text, caret){
  const beforeCaret = text.slice(0, caret);
  const match = beforeCaret.match(/@(\w*)$/);
  if(match){
    const q = match[1].toLowerCase();
    const filtered = PLUGIN_MENU.filter(function(p){ return p.type === 'mention' && p.cmd.startsWith(q); });
    if(filtered.length){ renderMentionDropdown(filtered); return; }
  }
  mentionDropdown.classList.remove('show');
}

inputEl.addEventListener('input', function(){
  const caret = getCaretOffset(inputEl);
  const text = getPlainText(inputEl);
  renderInput(text, caret);
});
inputEl.addEventListener('keydown', function(e){
  if(e.key === 'Enter'){
    e.preventDefault();
    if(mentionDropdown.classList.contains('show')){
      const first = mentionDropdown.querySelector('.mention-item');
      if(first){ insertMention(first.dataset.cmd); return; }
    }
    if(e.shiftKey){ insertAtCaret('\n'); }
    else { sendMessage(); }
  }
});

function renderMarkdown(raw){
  const text = typeof raw === 'string' ? raw : JSON.stringify(raw, null, 2);
  const dirty = marked.parse(text);
  const clean = DOMPurify.sanitize(dirty, { ADD_ATTR: ['target'] });
  const wrap = document.createElement('div');
  wrap.innerHTML = clean;

  // ganti semua <img> di markdown jadi image card yang klikable
  wrap.querySelectorAll('img').forEach(function(imgEl){
    const card = buildImageCard(imgEl.src, imgEl.alt || 'gambar.jpg');
    imgEl.parentElement.replaceChild(card, imgEl);
  });

  // ganti link audio jadi audio player
  wrap.querySelectorAll('a').forEach(function(aEl){
    const href = aEl.href || '';
    if(/\.(mp3|ogg|wav|m4a|aac|opus|flac)(\?|$)/i.test(href) || aEl.textContent.match(/\.(mp3|ogg|wav|m4a)/i)){
      const player = buildAudioPlayer(href, aEl.textContent || 'audio');
      aEl.parentElement.replaceChild(player, aEl);
    }
  });

  wrap.querySelectorAll('pre code').forEach(function(codeEl){
    const lang = (codeEl.className.match(/language-(\w+)/) || [,'text'])[1];
    const codeText = codeEl.textContent;
    const card = buildCodeCard(codeText, lang);
    codeEl.parentElement.replaceWith(card);
  });

  return wrap;
}

function buildCodeCard(code, language){
  const lang = (language || 'text').toLowerCase();
  const card = document.createElement('div');
  card.className = 'code-block';

  const head = document.createElement('div');
  head.className = 'code-head';
  const langLabel = document.createElement('span');
  langLabel.textContent = lang;
  head.appendChild(langLabel);

  const actions = document.createElement('div');
  actions.className = 'code-actions';

  const openBtn = document.createElement('button');
  openBtn.type = 'button';
  openBtn.textContent = '⤢ buka';
  openBtn.addEventListener('click', function(e){ e.stopPropagation(); openArtifact(code, lang); });
  actions.appendChild(openBtn);

  const dlBtn = document.createElement('button');
  dlBtn.type = 'button';
  dlBtn.textContent = '⬇ unduh';
  dlBtn.addEventListener('click', function(e){ e.stopPropagation(); downloadCode(code, lang); });
  actions.appendChild(dlBtn);

  const copyBtn = document.createElement('button');
  copyBtn.type = 'button';
  copyBtn.textContent = 'copy';
  copyBtn.addEventListener('click', function(e){
    e.stopPropagation();
    navigator.clipboard.writeText(code);
    e.target.textContent = 'disalin ✓';
    setTimeout(function(){ e.target.textContent = 'copy'; }, 1500);
  });
  actions.appendChild(copyBtn);

  head.appendChild(actions);
  card.appendChild(head);

  const pre = document.createElement('pre');
  const codeEl = document.createElement('code');
  codeEl.className = 'language-' + lang;
  codeEl.textContent = code.length > 700 ? code.slice(0, 700) + '\n...' : code;
  pre.appendChild(codeEl);
  card.appendChild(pre);
  hljs.highlightElement(codeEl);

  card.addEventListener('click', function(){ openArtifact(code, lang); });

  return card;
}

function downloadCode(code, language){
  const ext = EXT_MAP[language] || 'txt';
  const blob = new Blob([code], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ifxrq-' + Date.now() + '.' + ext;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
}

function openArtifact(code, language){
  const lang = (language || 'text').toLowerCase();
  currentArtifact = { code: code, language: lang };
  document.getElementById('artifactTitle').textContent = '📄 kode.' + (EXT_MAP[lang] || 'txt');

  const codeEl = document.getElementById('artifactCodeEl');
  codeEl.className = 'language-' + lang;
  codeEl.textContent = code;
  hljs.highlightElement(codeEl);

  const looksHtml = lang.indexOf('html') !== -1 || /<!DOCTYPE html|<html[\s>]/i.test(code);
  const previewTab = document.getElementById('artifactPreviewTab');
  previewTab.style.display = looksHtml ? 'inline-flex' : 'none';

  setArtifactTab(looksHtml ? 'preview' : 'code');
  document.getElementById('artifactOverlay').classList.add('show');
}
function setArtifactTab(tab){
  document.querySelectorAll('.artifact-tab').forEach(function(btn){
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
  const codeView = document.getElementById('artifactCodeView');
  const frame = document.getElementById('artifactPreviewFrame');
  if(tab === 'preview'){
    codeView.style.display = 'none';
    frame.style.display = 'block';
    frame.srcdoc = currentArtifact.code;
  } else {
    codeView.style.display = 'block';
    frame.style.display = 'none';
  }
}
document.querySelectorAll('.artifact-tab').forEach(function(btn){

});
document.getElementById('artifactCopy').addEventListener('click', function(e){

// typewriter effect untuk markdown content
async function typewriterMarkdown(container, text){
  // tampilkan per-karakter untuk teks pendek, per-chunk untuk teks panjang
  const el = document.createElement('div');
  container.appendChild(el);
  const CHUNK = text.length > 500 ? 8 : 2;
  const DELAY = text.length > 500 ? 8 : 20;
  for(let i=0; i<text.length; i+=CHUNK){
    el.textContent = text.slice(0, i+CHUNK);
    chatEl.scrollTop = chatEl.scrollHeight;
    await new Promise(r=>setTimeout(r,DELAY));
  }
  // render markdown final
  el.remove();
  container.appendChild(renderMarkdown(text));
  chatEl.scrollTop = chatEl.scrollHeight;
}

// FILE ATTACHMENT
// ============================================================
function isTextFile(file){
  if(file.type && file.type.indexOf('text/') === 0) return true;
  if(file.type === 'application/json') return true;
  if(TEXT_EXT_REGEX.test(file.name)) return true;
  return false;
}
function fileToText(file){
  return new Promise(function(resolve, reject){
    const r = new FileReader();
    r.onload = function(){ resolve(r.result); };
    r.onerror = reject;
    r.readAsText(file);
  });
}
function fileToBase64(file){
  return new Promise(function(resolve, reject){
    const r = new FileReader();
    r.onload = function(){ resolve(r.result.split(',')[1]); };
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}
function renderAttachStrip(){
  attachStrip.innerHTML = '';
  attachments.forEach(function(a, idx){
    const chip = document.createElement('div');
    chip.className = 'chip';
    if(a.previewUrl){
      chip.innerHTML = '<img src="' + a.previewUrl + '">';
    } else if(a.kind === 'audio'){
      chip.innerHTML = '<div class="filedot">🎵</div>';
    } else if(a.kind === 'text'){
      chip.innerHTML = '<div class="filedot">📝</div>';
    } else {
      chip.innerHTML = '<div class="filedot">📄</div>';
    }
    const label = document.createElement('span');
    label.textContent = a.name.length > 16 ? a.name.slice(0,14) + '…' : a.name;
    chip.appendChild(label);
    const rm = document.createElement('button');
    rm.textContent = '✕';
    rm.addEventListener('click', function(){ attachments.splice(idx,1); renderAttachStrip(); });
    chip.appendChild(rm);
    attachStrip.appendChild(chip);
  });
}

fileInput.addEventListener('change', async function(){
  const files = Array.from(fileInput.files);
  fileInput.value = '';
  if(files.length === 0) return;

  if(pickMode === 'camera' || pickMode === 'photo'){
    startPhotoEditQueue(files);
    return;
  }

  for(const file of files){
    if(file.size > 8 * 1024 * 1024){
      addSystemLine('[system] ' + file.name + ' kegedean (>8mb), skip', true);
      continue;
    }
    if(isTextFile(file)){
      const text = await fileToText(file);
      attachments.push({ name:file.name, mimeType:file.type || 'text/plain', kind:'text', textContent:text, previewUrl:null });
    } else if(file.type.indexOf('image/') === 0){
      const data = await fileToBase64(file);
      attachments.push({ name:file.name, mimeType:file.type, kind:'binary', data:data, previewUrl:URL.createObjectURL(file) });
    } else if(file.type.indexOf('audio/') === 0 || /\.(mp3|ogg|wav|m4a|aac|flac|opus)$/i.test(file.name)){
      const url = URL.createObjectURL(file);
      attachments.push({ name:file.name, mimeType:file.type || 'audio/mpeg', kind:'audio', audioUrl:url, previewUrl:null });
    } else {
      const data = await fileToBase64(file);
      attachments.push({ name:file.name, mimeType:file.type || 'application/octet-stream', kind:'binary', data:data, previewUrl:null });
    }
  }
  renderAttachStrip();
});

// PHOTO EDITOR
// ============================================================
function startPhotoEditQueue(files){
  photoQueue = Array.from(files).filter(function(f){ return f.type.indexOf('image/') === 0; });
  processNextPhoto();
}
function processNextPhoto(){
  if(photoQueue.length === 0){
    closePhotoEditor();
    renderAttachStrip();
    return;
  }
  const file = photoQueue.shift();
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = function(){
    editorState = { img: img, rotation: 0, brightness: 0, contrast: 0, file: file, objectUrl: url };
    document.getElementById('editorBrightness').value = 0;
    document.getElementById('editorContrast').value = 0;
    redrawEditor();
    document.getElementById('photoEditOverlay').classList.add('show');
  };
  img.src = url;
}
function closePhotoEditor(){
  document.getElementById('photoEditOverlay').classList.remove('show');
  if(editorState && editorState.objectUrl) URL.revokeObjectURL(editorState.objectUrl);
  editorState = null;
}
function redrawEditor(){
  if(!editorState) return;
  const img = editorState.img;
  const rotation = editorState.rotation;
  const rad = rotation * Math.PI / 180;
  const swapped = rotation % 180 !== 0;
  const maxDim = 480;
  const scale = Math.min(1, maxDim / Math.max(img.naturalWidth, img.naturalHeight));
  const drawW = img.naturalWidth * scale;
  const drawH = img.naturalHeight * scale;
  const cw = swapped ? drawH : drawW;
  const ch = swapped ? drawW : drawH;

  const canvas = document.getElementById('editorCanvas');
  canvas.width = cw;
  canvas.height = ch;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,cw,ch);
  ctx.save();
  ctx.filter = 'brightness(' + (100+editorState.brightness) + '%) contrast(' + (100+editorState.contrast) + '%)';
  ctx.translate(cw/2, ch/2);
  ctx.rotate(rad);
  ctx.drawImage(img, -drawW/2, -drawH/2, drawW, drawH);
  ctx.restore();
}
document.getElementById('editorRotateLeft').addEventListener('click', function(){ editorState.rotation = (editorState.rotation + 270) % 360; redrawEditor(); });
document.getElementById('editorRotateRight').addEventListener('click', function(){ editorState.rotation = (editorState.rotation + 90) % 360; redrawEditor(); });
document.getElementById('editorBrightness').addEventListener('input', function(e){ editorState.brightness = Number(e.target.value); redrawEditor(); });
document.getElementById('editorContrast').addEventListener('input', function(e){ editorState.contrast = Number(e.target.value); redrawEditor(); });
document.getElementById('editorCancel').addEventListener('click', function(){
  photoQueue = [];
  closePhotoEditor();
  renderAttachStrip();
});
document.getElementById('editorSkip').addEventListener('click', function(){
  if(editorState && editorState.objectUrl) URL.revokeObjectURL(editorState.objectUrl);
  processNextPhoto();
});
document.getElementById('editorUse').addEventListener('click', function(){
  const canvas = document.getElementById('editorCanvas');
  const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
  const base64 = dataUrl.split(',')[1];
  attachments.push({
    name: editorState.file.name,
    mimeType: 'image/jpeg',
    kind: 'binary',
    data: base64,
    previewUrl: dataUrl
  });
  if(editorState.objectUrl) URL.revokeObjectURL(editorState.objectUrl);
  processNextPhoto();
});

// PARSING RESPONS PLUGIN (bentuk json belum pasti, jadi nyoba
// beberapa kemungkinan nama field sekaligus)
// ============================================================
function parseSearchResponse(json){
  if(typeof json === 'string') return { answer: json, sources: [] };

  // format synoxcloud: json.result.text = jawaban, json.result.citations = sources
  const answer =
    (json.result && json.result.text) ||
    (json.result && json.result.message) ||
    json.result || json.text || json.message || json.answer ||
    'gak ada jawaban dari API';

  const rawCitations = (json.result && json.result.citations) || json.citations || [];
  // dedupe by url
  const seen = new Set();
  const sources = rawCitations
    .filter(function(s){ return s.url && !seen.has(s.url) && seen.add(s.url); })
    .map(function(s){
      return {
        title: s.title || s.url,
        url: s.url,
        // icon field dari synoxcloud adalah URL favicon langsung
        favicon: s.icon || ('https://www.google.com/s2/favicons?domain=' + (() => { try{ return new URL(s.url).hostname; }catch(_){ return s.url; } })())
      };
    });

  return { answer: typeof answer === 'string' ? answer : JSON.stringify(answer), sources: sources };
}

function parseEditResponse(json){
  if(typeof json === 'string') return { imageUrl: null, caption: json };
  // kasus 1: server udah konversi gambar ke base64 data URL (API balikin binary image)
  const dataUrl = json.imageDataUrl || (json.data && json.data.imageDataUrl);
  if(dataUrl) return { imageUrl: dataUrl, caption: '' };
  // kasus 2: API balikin url gambar dalam JSON
  const candidates = [json.url, json.result, json.image, json.output,
    json.data && json.data.url, json.data && json.data.image];
  const imageUrl = candidates.find(function(c){ return typeof c === 'string' && c.trim().length; });
  const caption = json.message || json.caption || json.description || '';
  return { imageUrl: imageUrl || null, caption: typeof caption === 'string' ? caption : '' };
}

// SEARCH YOUTUBE LANGSUNG DARI BROWSER (bukan lewat vercel)
// browser gak ada network restriction, jadi bisa akses API publik
// ============================================================
const YT_SEARCH_APIS = [
  // invidious public instances — coba satu-satu
  function(q){ return 'https://invidious.privacydev.net/api/v1/search?q=' + encodeURIComponent(q) + '&type=video&page=1'; },
  function(q){ return 'https://iv.melmac.space/api/v1/search?q=' + encodeURIComponent(q) + '&type=video&page=1'; },
  function(q){ return 'https://invidious.nerdvpn.de/api/v1/search?q=' + encodeURIComponent(q) + '&type=video&page=1'; },
  function(q){ return 'https://yt.artemislena.eu/api/v1/search?q=' + encodeURIComponent(q) + '&type=video&page=1'; },
  function(q){ return 'https://invidious.lunar.icu/api/v1/search?q=' + encodeURIComponent(q) + '&type=video&page=1'; },
];

async function ytSearchBrowser(query){
  let lastErr = null;
  for(const urlFn of YT_SEARCH_APIS){
    try{
      const r = await fetch(urlFn(query), { signal: AbortSignal.timeout(10000) });
      if(!r.ok){ lastErr = new Error('instance error ' + r.status); continue; }
      const data = await r.json();
      if(!Array.isArray(data) || !data.length){ lastErr = new Error('gak ada hasil'); continue; }
      const v = data[0];
      const videoId = v.videoId || v.id;
      if(!videoId){ lastErr = new Error('videoId kosong'); continue; }
      return {
        ok: true,
        videoId,
        title:       v.title || 'unknown',
        author:      v.author || v.authorName || 'unknown',
        durationFmt: v.lengthSeconds ? fmtNumDur(v.lengthSeconds) : (v.duration || '--:--'),
        viewsFmt:    fmtNum(v.viewCount || v.views || 0),
        likes:       v.likeCount || null,
        thumbnail:   (v.videoThumbnails && v.videoThumbnails[0] && v.videoThumbnails[0].url) ||
                     'https://i.ytimg.com/vi/' + videoId + '/hqdefault.jpg',
        url:         'https://www.youtube.com/watch?v=' + videoId
      };
    }catch(e){ lastErr = e; }
  }
  throw new Error('semua server search gagal: ' + (lastErr && lastErr.message || 'unknown'));
}

function fmtNumDur(s){
  s = Number(s)||0;
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  if(h>0) return h+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
  return m+':'+String(sec).padStart(2,'0');
}

function fmtNum(n){

  if(n >= 1e6) return (n/1e6).toFixed(1)+'M';

  return String(n);
}

      if(!upData.ok || !upData.url) throw new Error(upData.error || 'upload gagal');
      publicUrl = upData.url;
    } catch(upErr) {
      hideTyping();
      addSystemLine('[error] upload foto gagal — ' + upErr.message, true);
      history.pop();
      return;
    }

    // step 2: kirim url ke /api/uhd buat di-enhance AI
    const res = await fetch(UHD_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ imageUrl: publicUrl })
    });
    const data = await res.json();
    hideTyping();

    if(!res.ok){
      addSystemLine('[error] @uhd gagal — ' + (data.error && data.error.message || res.status), true);
      history.pop();
      return;
    }

    // tampilin hasil
    const parsed = parseEditResponse(data.data || data);
    const resultRow = document.createElement('div');
    resultRow.className = 'row bot';
    const av = document.createElement('div');
    av.className = 'mini-av';
    av.textContent = 'IF';
    resultRow.appendChild(av);
    const b = document.createElement('div');
    b.className = 'bubble';
    const badge = document.createElement('div');
    badge.className = 'search-badge';
    badge.textContent = '✨ hasil uhd-ai';
    b.appendChild(badge);
    if(parsed.imageUrl){
      b.appendChild(buildImageCard(parsed.imageUrl, 'uhd-result.jpg'));
    } else {
      const note = document.createElement('div');
      note.style.cssText = 'font-size:11px;color:var(--muted);font-family:JetBrains Mono,monospace;';
      note.textContent = 'gak nemu url gambar hasil di response API, cek devtools.';
      b.appendChild(note);
    }
    resultRow.appendChild(b);
    chatEl.appendChild(resultRow);
    chatEl.scrollTop = chatEl.scrollHeight;
    history.push({ role:'model', parts:[{ text: 'foto udah di-enhance UHD' }] });

  }catch(err){
    hideTyping();
    addSystemLine('[error] @uhd error — ' + err.message, true);
    history.pop();
  }finally{
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

async function sendMessage(){
  const raw = getPlainText(inputEl).trim();
  if(!raw && attachments.length === 0) return;

  const berfikirMatch = raw.match(/^@berfikir\s*([\s\S]*)/i);
  if(berfikirMatch){
    const q = berfikirMatch[1].trim() || raw;
    // kalo ada gambar, attach context gambar ke pertanyaan
    const imgAtt = attachments.find(function(a){ return a.mimeType && a.mimeType.startsWith('image/'); });
    await runBerfikirPlugin(raw, q, imgAtt || null);
    return;
  }

  const hdMatch = raw.match(/^@hd\s*/i);
  if(hdMatch){
    const imageAtt = attachments.find(function(a){ return a.mimeType && a.mimeType.startsWith('image/'); });
    if(!imageAtt){ addSystemLine('[system] buat @hd, attach fotonya dulu (pencet + > foto)', true); return; }
    await runHdPlugin(raw || '@hd', imageAtt);
    return;
  }

  const uhdMatch = raw.match(/^@uhd(-ai)?\s*/i);
  if(uhdMatch || /^@uhd(-ai)?\s*$/i.test(raw)){
    const imageAtt = attachments.find(function(a){ return a.mimeType && a.mimeType.startsWith('image/'); });
    if(!imageAtt){
      addSystemLine('[system] buat @uhd, attach fotonya dulu (pencet + > foto), terus ketik @uhd', true);
      return;
    }
    await runUhdPlugin(raw || '@uhd', imageAtt);
    return;
  }

  const editMatch = raw.match(/^@edit\s+([\s\S]+)/i);
  if(editMatch){
    const imageAtt = attachments.find(function(a){ return a.mimeType && a.mimeType.indexOf('image/') === 0; });
    if(!imageAtt){
      addSystemLine('[system] buat edit foto, attach/kirim fotonya dulu (pencet + > foto), abis itu ketik @edit diikuti instruksinya. contoh: @edit ubah jadi malam', true);
      return;
    }
    await runEditPlugin(raw, editMatch[1].trim(), imageAtt);
    return;
  }
  if(/^@edit\s*$/i.test(raw)){
    addSystemLine('[system] abis @edit ketik instruksinya, contoh: @edit ubah jadi malam (jangan lupa attach fotonya dulu)', true);
    return;
  }

  const playMatch = raw.match(/^@play\s+([\s\S]+)/i);
  if(playMatch){
    await runPlayPlugin(raw, playMatch[1].trim());
    return;
  }
  if(/^@play\s*$/i.test(raw)){
    addSystemLine('[system] abis @play ketik nama lagu/videonya, contoh: @play abadierus', true);
    return;
  }

  const searchMatch = raw.match(/^@search\s+([\s\S]+)/i);
  if(searchMatch){
    await runSearchPlugin(raw, searchMatch[1].trim());
    return;
  }
  if(/^@search\s*$/i.test(raw)){
    addSystemLine('[system] abis @search ketik query-nya, contoh: @search skor timnas hari ini', true);
    return;
  }

  // ── @code ──
  const codeMatch = raw.match(/^@code\s+([\s\S]+)/i);
  if(codeMatch){
    let attachedCode = null;
    const textAtt = attachments.find(function(a){ return a.kind === 'text'; });
    if(textAtt){
      attachedCode = { filename: textAtt.name, content: textAtt.textContent };
    }
    await runCodePlugin(raw, codeMatch[1].trim(), attachedCode);
    return;
  }
  if(/^@code\s*$/i.test(raw)){
    addSystemLine('[system] abis @code ketik instruksi coding-nya, contoh: @code buatkan rest api express', true);
    return;
  }

  const parts = [];
  // teks dulu, baru lampiran (ordering penting buat Gemini)
  if(raw) parts.push({ text: raw });
  attachments.forEach(function(a){
    if(a.kind === 'text'){
      parts.push({ text: 'berikut isi file "' + a.name + '":\n```\n' + a.textContent + '\n```' });
    } else if(a.mimeType && a.mimeType.startsWith('image/')){
      // pastiin data bersih (pure base64, tanpa data URL prefix)
      const cleanData = a.data ? a.data.replace(/^data:[^;]+;base64,/, '') : a.data;
      parts.push({ inlineData: { mimeType: a.mimeType, data: cleanData } });
    } else if(a.kind === 'audio'){
      parts.push({ text: 'user melampirkan file audio: "' + a.name + '".' });
    } else {
      parts.push({ text: 'user melampirkan file: "' + a.name + '" (mime: ' + a.mimeType + ').' });
    }
  });

  const row = addBubble('user', raw || '(kirim file)', false);
  if(attachments.length){
    const wrap = document.createElement('div');
    attachments.forEach(function(a){
      if(a.previewUrl){
        const card = buildImageCard(a.previewUrl, a.name || 'gambar.jpg');
        card.querySelector('img').style.maxWidth = '160px';
        card.querySelector('img').style.maxHeight = '140px';
        wrap.appendChild(card);
      } else if(a.kind === 'audio'){
        const player = buildAudioPlayer(a.audioUrl, a.name);
        player.style.marginTop = '8px';
        wrap.appendChild(player);
      } else if(a.kind === 'text'){
        const chip = document.createElement('div');
        chip.style.fontFamily = "'JetBrains Mono', monospace";
        chip.style.fontSize = '11px';
        chip.style.color = 'var(--muted)';
        chip.style.marginTop = '6px';
        chip.textContent = '📝 ' + a.name;
        wrap.appendChild(chip);
      }
    });
    row.querySelector('.bubble').appendChild(wrap);
  }

  history.push({ role:'user', parts: parts });
  renderInput('', 0);
  attachments = [];
  renderAttachStrip();
  sendBtn.disabled = true;
  hudCount.textContent = history.filter(function(h){ return h.role==='user'; }).length;
  showTyping();

  try{
    const res = await fetch(CHAT_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: MODEL,
        systemInstruction: SYSTEM_PROMPT,
        contents: history,
        generationConfig: { temperature: 0.9, maxOutputTokens: MAX_OUTPUT_TOKENS }
      })
    });

    const data = await res.json();
    hideTyping();

    if(!res.ok){
      const msg = (data && data.error && data.error.message) || ('http ' + res.status);
      addSystemLine('[error] gagal connect ke backend — ' + msg, true);
      history.pop();
      return;
    }

    const reply = (data.candidates && data.candidates[0] && data.candidates[0].content &&
                   data.candidates[0].content.parts && data.candidates[0].content.parts.map(function(p){ return p.text; }).filter(Boolean).join(''))
                  || '[kosong — kena filter atau candidate abis]';
    await addBubbleTyped(reply);
    history.push({ role:'model', parts:[{ text: reply }] });

  }catch(err){
    hideTyping();
    addSystemLine('[error] request gagal — ' + err.message, true);
    history.pop();
  }finally{
    sendBtn.disabled = false;
    inputEl.focus();
    if(typeof window.saveCurrentSession === 'function') window.saveCurrentSession();
  }
}

          lanjut dengan Google
        </button>`;
      document.getElementById('aiSubmit').onclick = doLogin;

    } else {
      body.innerHTML = `
        <div class="auth-field"><label>USERNAME</label><input id="aiUser" placeholder="username (unik)" autocomplete="username"></div>
        <div class="auth-field"><label>EMAIL</label><input id="aiEmail" type="email" placeholder="email lo" autocomplete="email"></div>
        <div class="auth-field"><label>PASSWORD</label><input id="aiPass" type="password" placeholder="password" autocomplete="new-password"></div>
        <div class="auth-field"><label>ULANGI PASSWORD</label><input id="aiPass2" type="password" placeholder="ulangi password" autocomplete="new-password"></div>
        <div class="auth-err" id="aiErr"></div>
        <button class="auth-btn" id="aiSubmit">daftar</button>
        <div class="auth-divider">atau</div>
        <button class="auth-google" id="aiGoogle">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.5l6.7-6.7C35.8 2.5 30.3 0 24 0 14.7 0 6.8 5.5 3.1 13.5l7.8 6c1.8-5.4 6.8-10 13.1-10z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.2-.4-4.7H24v9h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17.3z"/><path fill="#FBBC05" d="M10.9 28.5A14.7 14.7 0 0 1 9.5 24c0-1.6.3-3.1.8-4.5l-7.8-6A24 24 0 0 0 0 24c0 3.9.9 7.5 2.5 10.8l8.4-6.3z"/><path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.8-5.8l-7.5-5.8c-2.1 1.4-4.8 2.3-8.3 2.3-6.3 0-11.6-4.3-13.5-10L2.5 34.8C6.3 42.5 14.5 48 24 48z"/></svg>
          daftar dengan Google
        </button>`;
      document.getElementById('aiSubmit').onclick = doRegister;
      document.getElementById('aiGoogle').onclick  = doGoogle;
    }
  }

  function err(msg){ const el=document.getElementById('aiErr'); if(el) el.textContent=msg; }

  function doLogin(){
    const login = document.getElementById('aiLogin').value.trim();
    const pass  = document.getElementById('aiPass').value;
    if(!login||!pass){ return err('isi semua field dulu'); }
    const users = getUsers();
    const user  = Object.values(users).find(function(u){ return u.username===login || u.email===login; });
    if(!user || user.password !== btoa(pass)){ return err('username/email atau password salah'); }
    setSession({ username:user.username, email:user.email });
    overlay.style.display = 'none';
  }

  function doRegister(){
    const uname = document.getElementById('aiUser').value.trim();
    const email = document.getElementById('aiEmail').value.trim();
    const pass  = document.getElementById('aiPass').value;
    const pass2 = document.getElementById('aiPass2').value;
    if(!uname||!email||!pass||!pass2){ return err('isi semua field dulu'); }
    if(pass !== pass2){ return err('password gak sama'); }
    if(pass.length < 6){ return err('password minimal 6 karakter'); }
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ return err('format email gak valid'); }
    const users = getUsers();
    if(Object.values(users).find(function(u){ return u.username===uname; })){ return err('username udah dipake'); }
    if(Object.values(users).find(function(u){ return u.email===email; })){ return err('email udah terdaftar'); }
    users[uname] = { username:uname, email:email, password:btoa(pass) };
    saveUsers(users);
    // setelah daftar, jangan langsung masuk — suruh login dulu
    const okMsg = document.createElement('div');
    okMsg.className = 'auth-ok';
    okMsg.textContent = 'akun berhasil dibuat! silakan login dengan email/username dan password kamu.';
    document.getElementById('aiErr').replaceWith(okMsg);
    // switch ke tab login
    setTimeout(function(){
      tabs.forEach(function(t){ t.classList.remove('active'); });
      tabs[0].classList.add('active');
      mode = 'login';
      render();
    }, 1800);
  }

  function doGoogle(){
    // simulasi Google login — buat akun guest dengan id unik
    const gid = 'google_' + Math.random().toString(36).slice(2, 10);
    setSession({ username:gid, email:gid + '@gmail.com', isGoogle:true });
    overlay.style.display = 'none';
  }

  tabs.forEach(function(tab){
    tab.addEventListener('click', function(){
      tabs.forEach(function(t){ t.classList.remove('active'); });
      tab.classList.add('active');
      mode = tab.dataset.auth;
      render();
    });
  });

  // cek session
  const session = getSession();
  if(session && session.username){
    overlay.style.display = 'none';
  } else {
    render();
  }
})();

    const res = await fetch(BERFIKIR_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pesan: question, history: recentHistory, imageUrl: imagePublicUrl })
    });
    const data = await res.json();

    // update step status berdasarkan hasil
    stopThinkTimers();
    // hapus thinking UI setelah done
    wrap.remove();
    badge.textContent = '🧠 berfikir';

    if(!res.ok || !data.ok){
      answerWrap.style.display = 'block';
      answerWrap.appendChild(renderMarkdown('gagal: ' + (data.error || res.status)));
    } else {
      answerWrap.style.display = 'block';
      // animasi ngetik
      await typewriterMarkdown(answerWrap, data.answer);
      history.push({ role:'model', parts:[{ text: data.answer }] });
    }

  }catch(err){
    stopThinkTimers();
    markStep('s1','err','gagal berfikir');
    badge.textContent = '🧠 gagal';
    answerWrap.style.display = 'block';
    answerWrap.textContent = '[error] ' + err.message;
    history.pop();
  }finally{
    sendBtn.disabled = false;
    chatEl.scrollTop = chatEl.scrollHeight;
    inputEl.focus();
  }
}


// ============================================================
// PLUGIN @code — coding assistant (Claude Code style)
// ============================================================
async function runCodePlugin(originalText, prompt, attachedCode){
  const userRow = addBubble('user', originalText, false);
  if(attachedCode && attachedCode.content){
    const chip = document.createElement('div');
    chip.style.cssText = "font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-top:6px;";
    chip.textContent = '📝 ' + attachedCode.filename + ' (' + attachedCode.content.length + ' chars)';
    userRow.querySelector('.bubble').appendChild(chip);
  }
  history.push({ role:'user', parts:[{ text: originalText }] });
  renderInput('', 0);
  attachments = [];
  renderAttachStrip();
  sendBtn.disabled = true;
  hudCount.textContent = history.filter(function(h){ return h.role==='user'; }).length;
  showTyping();
  try{
    const res = await fetch(CODE_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: prompt, history: history.slice(-6), attachedCode: attachedCode })
    });
    const data = await res.json();
    hideTyping();
    if(!res.ok || !data.ok){
      addSystemLine('[error] @code gagal — ' + (data.error || 'http ' + res.status), true);
      history.pop();
      return;
    }
    const answer = data.answer || '';
    const codeBlocks = answer.match(/```(\w*)\n([\s\S]*?)```/g);
    if(codeBlocks && codeBlocks.length >= 1){
      const firstBlock = codeBlocks[0];
      const langMatch = firstBlock.match(/```(\w*)\n([\s\S]*?)```/);
      const lang = (langMatch && langMatch[1]) || 'text';
      const code = (langMatch && langMatch[2]) || '';
      let explanation = answer.replace(/```[\s\S]*?```/g, '').trim();
      const row = document.createElement('div');
      row.className = 'row bot';
      const av = document.createElement('div');
      av.className = 'mini-av';
      av.textContent = 'IF';
      row.appendChild(av);
      const b = document.createElement('div');
      b.className = 'bubble';
      const badge = document.createElement('div');
      badge.className = 'search-badge';
      badge.textContent = '💻 hasil kode (' + (data.source || 'ai') + ')';
      b.appendChild(badge);
      if(explanation) b.appendChild(renderMarkdown(explanation));
      b.appendChild(buildCodeCard(code, lang));
      row.appendChild(b);
      chatEl.appendChild(row);
      chatEl.scrollTop = chatEl.scrollHeight;
    } else {
      await addBubbleTyped(answer);
    }
    history.push({ role:'model', parts:[{ text: answer }] });
  }catch(err){
    hideTyping();
    addSystemLine('[error] @code error — ' + err.message, true);
    history.pop();
  }finally{
    sendBtn.disabled = false;
    inputEl.focus();
  }
}


// ============================================================
// SIDEBAR — SESSION HISTORY + ACCOUNT INFO
// ============================================================
(function initSidebar(){
  const SESSION_KEY = 'ifxrq_sessions';
  const ACTIVE_KEY  = 'ifxrq_active_session';

  function getSessions(){ try{ return JSON.parse(localStorage.getItem(SESSION_KEY)||'[]'); }catch(_){ return []; } }
  function saveSessions(s){ localStorage.setItem(SESSION_KEY, JSON.stringify(s)); }
  function getActiveId(){ return localStorage.getItem(ACTIVE_KEY)||null; }
  function setActiveId(id){ localStorage.setItem(ACTIVE_KEY, id); }
  function getSession(){ try{ return JSON.parse(localStorage.getItem('ifxrq_session')||'null'); }catch(_){ return null; } }

  function newSessionId(){ return 's_' + Date.now() + '_' + Math.random().toString(36).slice(2,6); }

  function getFirstMsg(hist){ 
    const u = hist && hist.find && hist.find(function(h){ return h.role==='user'; });
    if(!u) return 'sesi baru';
    const p = u.parts && u.parts[0];
    const t = (p && p.text) || 'sesi baru';
    return t.slice(0,40) + (t.length>40?'…':'');
  }

  function renderSessionList(){
    const list = document.getElementById('sessionList');
    if(!list) return;
    const sessions = getSessions();
    const activeId = getActiveId();
    if(!sessions.length){
      list.innerHTML = '<div class="session-empty">belum ada sesi chat 🗿<br>mulai aja dulu</div>';
      return;
    }
    list.innerHTML = '';
    // tampilkan dari terbaru
    sessions.slice().reverse().forEach(function(s){
      const item = document.createElement('div');
      item.className = 'session-item' + (s.id===activeId?' active':'');
      item.innerHTML =
        '<span class="s-icon">💬</span>' +
        '<span class="s-title">' + escapeHtml(s.title||'sesi baru') + '</span>' +
        '<button class="s-del" title="hapus">✕</button>';
      item.querySelector('.s-title').addEventListener('click', function(){ loadSession(s.id); });
      item.querySelector('.s-icon').addEventListener('click', function(){ loadSession(s.id); });
      item.querySelector('.s-del').addEventListener('click', function(e){
        e.stopPropagation(); deleteSession(s.id);
      });
      list.appendChild(item);
    });
  }

  function renderAccount(){
    const el = document.getElementById('sidebarAccount');
    if(!el) return;
    const session = getSession();
    if(!session){ el.innerHTML = ''; return; }
    const initials = (session.username||'?').slice(0,2).toUpperCase();
    el.innerHTML =
      '<div class="account-avatar">' + initials + '</div>' +
      '<div class="account-info">' +
        '<div class="account-name">' + escapeHtml(session.username||'user') + '</div>' +
        '<div class="account-email">' + escapeHtml(session.email||'') + '</div>' +
      '</div>' +
      '<button class="account-logout" id="logoutBtn" title="keluar">⏏</button>';
    document.getElementById('logoutBtn').addEventListener('click', function(){
      localStorage.removeItem('ifxrq_session');
      location.reload();
    });
  }

  window.saveCurrentSession = function(){
    if(!history || !history.length) return;
    const sessions = getSessions();
    let activeId = getActiveId();
    const title = getFirstMsg(history);
    const histCopy = JSON.parse(JSON.stringify(history));
    const existing = sessions.find(function(s){ return s.id===activeId; });
    if(existing){
      existing.title = title;
      existing.history = histCopy;
      existing.updated = Date.now();
    } else {
      activeId = newSessionId();
      setActiveId(activeId);
      sessions.push({ id:activeId, title:title, history:histCopy, updated:Date.now() });
    }
    saveSessions(sessions);
    // juga simpan ke dedicated key buat recovery kalau sesi aktif hilang
    try{ localStorage.setItem('ifxrq_current_' + activeId, JSON.stringify(histCopy)); }catch(_){}
    renderSessionList();
  };

  // restore sesi aktif saat page load
  (function restoreActiveSession(){
    const activeId = getActiveId();
    if(!activeId) return;
    const sessions = getSessions();
    const s = sessions.find(function(x){ return x.id===activeId; });
    if(!s||!s.history||!s.history.length) return;
    s.history.forEach(function(h){ history.push(h); });
    const chatEl = document.getElementById('chat');
    chatEl.innerHTML = '';
    s.history.forEach(function(h){
      if(h.role==='user'){
        const txt=(h.parts&&h.parts[0]&&h.parts[0].text)||'';
        addBubble('user',txt,false);
      } else if(h.role==='model'){
        const txt=(h.parts&&h.parts[0]&&h.parts[0].text)||'';
        addBubble('bot',txt,true);
      }
    });
    document.getElementById('hudCount').textContent = history.filter(function(h){ return h.role==='user'; }).length;
    document.getElementById('hudSession').textContent = activeId.slice(-6);
  })();

  function loadSession(id){
    window.saveCurrentSession();
    const sessions = getSessions();
    const s = sessions.find(function(x){ return x.id===id; });
    if(!s) return;
    setActiveId(id);
    history.length = 0;
    (s.history||[]).forEach(function(h){ history.push(h); });
    const chatEl = document.getElementById('chat');
    chatEl.innerHTML = '';
    history.forEach(function(h){
      if(h.role==='user'){
        const txt = (h.parts&&h.parts[0]&&h.parts[0].text)||'';
        addBubble('user', txt, false);
      } else if(h.role==='model'){
        const txt = (h.parts&&h.parts[0]&&h.parts[0].text)||'';
        addBubble('bot', txt, true);
      }
    });
    document.getElementById('hudCount').textContent = history.filter(function(h){ return h.role==='user'; }).length;
    renderSessionList();
    // tutup sidebar di mobile
    document.getElementById('sidebar').classList.remove('open');
  }

  function deleteSession(id){
    let sessions = getSessions();
    sessions = sessions.filter(function(s){ return s.id!==id; });
    saveSessions(sessions);
    if(getActiveId()===id){
      localStorage.removeItem(ACTIVE_KEY);
      history.length=0;
      document.getElementById('chat').innerHTML='';
      document.getElementById('hudCount').textContent='0';
    }
    renderSessionList();
  }

  function startNewSession(){
    window.saveCurrentSession();
    localStorage.removeItem(ACTIVE_KEY);
    history.length = 0;
    const chatEl = document.getElementById('chat');
    chatEl.innerHTML = '';
    document.getElementById('hudCount').textContent = '0';
    addBubble('bot','yo, sesi baru dimulai 🗿 mau ngobrol apa?', false);
    renderSessionList();
    document.getElementById('sidebar').classList.remove('open');
  }

  document.getElementById('newSessionBtn').addEventListener('click', startNewSession);

  // sidebar toggle mobile
  const toggleBtn = document.getElementById('sidebarToggle');
  if(toggleBtn){
    toggleBtn.addEventListener('click', function(){
      document.getElementById('sidebar').classList.toggle('open');
    });
  }
  // close sidebar ketika klik di luar (mobile)
  document.addEventListener('click', function(e){
    const sb = document.getElementById('sidebar');
    if(sb && sb.classList.contains('open') && !sb.contains(e.target) && e.target !== toggleBtn){
      sb.classList.remove('open');
    }
  });

  // auto-save setiap kali ada pesan baru
  const origAddBubble = addBubble;
  // patch dilakukan setelah inisialisasi

  renderSessionList();
  renderAccount();
})();
