<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IFxrq // online</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
<style>
  :root{
    --bg: #0c0e12;
    --panel: #14171d;
    --panel-2: #1b1f27;
    --line: #262b34;
    --text: #e9e8e3;
    --muted: #868c96;
    --lime: #c6ff3d;
    --magenta: #ff3d7f;
    --danger: #ff5c5c;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%; width:100%; overflow:hidden;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(198,255,61,0.06), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 10%, rgba(255,61,127,0.05), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Inter', sans-serif;
    min-height:100dvh;
  }
  
  /* ===== MAIN SPLIT CONTAINER (CLAUDE AI STYLE) ===== */
  .main-container {
    display: flex;
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
    position: relative;
  }

  .app{
    flex: 1;
    height: 100%;
    background:var(--panel);
    display:flex;
    flex-direction:column;
    overflow:hidden;
    position:relative;
    border-right: 1px solid var(--line);
    transition: flex 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ===== CLAUDE STYLE ARTIFACT PANEL ===== */
  .artifact-panel {
    width: 0;
    opacity: 0;
    height: 100%;
    background: #0f1115;
    display: flex;
    flex-direction: column;
    border-left: 1px solid var(--line);
    transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s ease;
    z-index: 10;
    overflow: hidden;
  }
  .artifact-panel.show {
    width: 50vw;
    opacity: 1;
  }
  @media (max-width: 768px) {
    .artifact-panel.show {
      position: absolute;
      top: 0; right: 0;
      width: 100vw;
      height: 100%;
    }
  }
  .artifact-head {
    padding: 12px 16px;
    background: var(--panel-2);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .artifact-title {
    font-family: 'Chakra Petch', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--lime);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .artifact-tabs {
    display: flex;
    background: var(--bg);
    padding: 3px;
    border-radius: 8px;
    border: 1px solid var(--line);
  }
  .art-tab {
    background: transparent;
    border: none;
    color: var(--muted);
    padding: 4px 12px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    border-radius: 6px;
  }
  .art-tab.active {
    background: var(--panel-2);
    color: var(--lime);
  }
  .artifact-actions {
    display: flex;
    gap: 6px;
  }
  .art-btn {
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 5px 10px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    border-radius: 6px;
    cursor: pointer;
  }
  .art-btn:hover {
    border-color: var(--lime);
    color: var(--lime);
  }
  .artifact-body {
    flex: 1;
    overflow: auto;
    position: relative;
    background: #090a0d;
  }
  .artifact-body pre {
    margin: 0;
    padding: 16px;
    height: 100%;
    overflow: auto;
    font-size: 13px;
  }
  .artifact-preview-frame {
    width: 100%;
    height: 100%;
    border: none;
    background: #ffffff;
    display: none;
  }

  /* ===== HEADER ===== */
  .head{
    padding:16px 18px 12px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    gap:12px;
    background:linear-gradient(180deg, var(--panel-2), var(--panel));
  }
  .avatar{
    width:46px; height:46px;
    flex-shrink:0;
    clip-path: polygon(25% 3%, 75% 3%, 100% 50%, 75% 97%, 25% 97%, 0% 50%);
    background: linear-gradient(135deg, var(--lime), #6fce00);
    display:flex; align-items:center; justify-content:center;
    font-family:'Chakra Petch', sans-serif;
    font-weight:700;
    color:#0c0e12;
    font-size:18px;
    position:relative;
  }
  .dot{
    position:absolute;
    bottom:-1px; right:-1px;
    width:12px; height:12px;
    border-radius:50%;
    background:var(--lime);
    border:2px solid var(--panel);
    box-shadow:0 0 8px var(--lime);
    animation: pulse 2s infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .head-info{flex:1; min-width:0;}
  .head-name{
    font-family:'Chakra Petch', sans-serif;
    font-weight:700; font-size:17px; letter-spacing:0.3px;
    display:flex; align-items:center; gap:8px;
  }
  .head-tag{
    font-size:10px; font-family:'JetBrains Mono', monospace; color:#0c0e12;
    background:var(--lime); padding:1px 6px; border-radius:4px; font-weight:500; letter-spacing:0.5px;
  }
  .head-sub{ font-size:12px; color:var(--muted); font-family:'JetBrains Mono', monospace; margin-top:2px; }

  /* ===== HUD STRIP ===== */
  .hud{ display:flex; font-family:'JetBrains Mono', monospace; font-size:10.5px; color:var(--muted); border-bottom:1px solid var(--line); background:#0f1116; }
  .hud div{ flex:1; padding:6px 10px; border-right:1px solid var(--line); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .hud div:last-child{border-right:none;}
  .hud b{color:var(--text); font-weight:500;}

  /* ===== CHAT ===== */
  .chat{ flex:1; overflow-y:auto; padding:18px 14px; display:flex; flex-direction:column; gap:12px; }
  .chat::-webkit-scrollbar{width:6px;}
  .chat::-webkit-scrollbar-thumb{background:var(--line); border-radius:3px;}

  .row{ display:flex; gap:8px; align-items:flex-end; max-width:92%; }
  .row.bot{ align-self:flex-start; }
  .row.user{ align-self:flex-end; flex-direction:row-reverse; }
  .mini-av{
    width:24px; height:24px; flex-shrink:0;
    clip-path: polygon(25% 3%, 75% 3%, 100% 50%, 75% 97%, 25% 97%, 0% 50%);
    background:linear-gradient(135deg, var(--lime), #6fce00);
    display:flex; align-items:center; justify-content:center;
    font-family:'Chakra Petch', sans-serif; font-weight:700; font-size:10px; color:#0c0e12;
  }
  .bubble{ padding:10px 13px; font-size:14.5px; line-height:1.55; word-break:break-word; }
  .row.bot .bubble{ background:var(--panel-2); border:1px solid var(--line); border-radius:3px 14px 14px 14px; color:var(--text); }
  .row.user .bubble{
    background: linear-gradient(135deg, rgba(198,255,61,0.16), rgba(198,255,61,0.08));
    border:1px solid rgba(198,255,61,0.35); border-radius:14px 3px 14px 14px; color:var(--text); white-space:pre-wrap;
  }
  .row.sys{ align-self:center; max-width:95%; }
  .row.sys .bubble{ background:transparent; border:1px dashed var(--line); color:var(--muted); font-family:'JetBrains Mono', monospace; font-size:11.5px; text-align:center; border-radius:8px; }
  .row.err .bubble{ border-color:rgba(255,92,92,0.4); color:var(--danger); }

  /* ===== MARKDOWN CONTENT ===== */
  .bubble p{ margin:0 0 8px; }
  .bubble p:last-child{ margin-bottom:0; }
  .bubble ul, .bubble ol{ margin:0 0 8px 18px; }
  .bubble a{ color:#5da9ff; text-decoration:none; }
  .bubble a:hover{ text-decoration:underline; }
  .plugin-mention{ color:var(--magenta); font-weight:700; }
  .bubble code{
    background:#0f1116; border:1px solid var(--line); border-radius:4px;
    padding:1px 5px; font-family:'JetBrains Mono', monospace; font-size:12.5px; color:var(--lime);
  }
  
  /* CODE BLOCK CUSTOM & OPEN IN ARTIFACT BUTTON */
  .code-block{ margin:8px 0; border:1px solid var(--line); border-radius:9px; overflow:hidden; }
  .code-head{
    display:flex; align-items:center; justify-content:space-between;
    background:#0f1116; padding:6px 10px; font-family:'JetBrains Mono', monospace; font-size:10.5px; color:var(--muted);
    border-bottom:1px solid var(--line);
  }
  .code-actions-grp { display:flex; gap:6px; }
  .code-head button{
    background:transparent; border:1px solid var(--line); color:var(--muted); border-radius:5px;
    font-size:10px; padding:3px 8px; cursor:pointer; font-family:'JetBrains Mono', monospace;
  }
  .code-head button:hover{ color:var(--lime); border-color:var(--lime); }
  .code-block pre{ margin:0; padding:12px; overflow-x:auto; font-size:12.5px; }
  .code-block pre code{ background:none; border:none; padding:0; color:inherit; }

  .bubble table{ border-collapse:collapse; width:100%; margin:8px 0; font-size:13px; }
  .bubble th, .bubble td{ border:1px solid var(--line); padding:6px 9px; text-align:left; }
  .bubble th{ background:#0f1116; font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--lime); }
  .bubble tr:nth-child(even) td{ background:rgba(255,255,255,0.02); }
  .bubble img{ max-width:100%; border-radius:9px; margin:6px 0; border:1px solid var(--line); display:block; }

  .typing{ display:flex; gap:4px; padding:11px 14px; background:var(--panel-2); border:1px solid var(--line); border-radius:3px 14px 14px 14px; width:fit-content; }
  .typing span{ width:6px; height:6px; border-radius:50%; background:var(--lime); opacity:0.5; animation:blink 1.1s infinite; }
  .typing span:nth-child(2){ animation-delay:.15s; }
  .typing span:nth-child(3){ animation-delay:.3s; }
  @keyframes blink{ 0%,80%,100%{opacity:.25; transform:translateY(0);} 40%{opacity:1; transform:translateY(-2px);} }

  /* ===== SEARCH BADGE ===== */
  .search-badge{
    display:inline-flex; align-items:center; gap:5px;
    font-family:'JetBrains Mono', monospace; font-size:10px; color:var(--lime);
    background:rgba(198,255,61,0.1); border:1px solid rgba(198,255,61,0.3);
    padding:2px 8px; border-radius:20px; margin-bottom:8px;
  }
  .source-list{ margin-top:10px; display:flex; flex-direction:column; gap:6px; }
  .source-item{
    display:flex; align-items:center; gap:8px;
    background:#0f1116; border:1px solid var(--line); border-radius:9px; padding:7px 9px;
  }
  .source-favicon{ width:18px; height:18px; border-radius:4px; flex-shrink:0; background:var(--panel); }
  .source-meta{ flex:1; min-width:0; }
  .source-title{ font-size:12px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .source-host{ font-size:10px; color:var(--muted); font-family:'JetBrains Mono', monospace; }
  .source-btn{
    flex-shrink:0; background:transparent; border:1px solid var(--lime); color:var(--lime);
    font-family:'JetBrains Mono', monospace; font-size:10px; padding:5px 9px; border-radius:7px; cursor:pointer; letter-spacing:0.4px;
  }
  .source-btn:hover{ background:var(--lime); color:#0c0e12; }

  /* ===== ATTACHMENTS STRIP ===== */
  .attach-strip{ display:flex; gap:6px; padding:8px 10px 0; flex-wrap:wrap; }
  .chip{
    display:flex; align-items:center; gap:6px; background:var(--bg); border:1px solid var(--line);
    border-radius:8px; padding:4px 8px 4px 4px; font-size:11px; font-family:'JetBrains Mono', monospace; color:var(--muted);
  }
  .chip img{ width:22px; height:22px; object-fit:cover; border-radius:5px; }
  .chip .filedot{ width:22px; height:22px; border-radius:5px; background:var(--panel-2); display:flex; align-items:center; justify-content:center; font-size:12px; }
  .chip button{ background:none; border:none; color:var(--muted); cursor:pointer; font-size:13px; padding:0 2px; }
  .chip button:hover{ color:var(--danger); }

  /* ===== INPUT PANEL ===== */
  .inputbar{ border-top:1px solid var(--line); background:var(--panel-2); padding:10px; display:flex; gap:8px; align-items:flex-end; position:relative; }
  .iconbtn{
    width:42px; height:42px; border-radius:12px; border:1px solid var(--line); background:var(--bg);
    color:var(--muted); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:.15s;
    font-size:22px; font-weight:400; line-height:1;
  }
  .iconbtn:hover{ color:var(--lime); border-color:var(--lime); }
  .iconbtn.active{ color:var(--lime); border-color:var(--lime); transform:rotate(45deg); }
  .input-wrap{ flex:1; position:relative; }
  textarea{
    width:100%; resize:none; background:var(--bg); border:1px solid var(--line); border-radius:12px; padding:10px 12px;
    color:var(--text); font-family:'Inter', sans-serif; font-size:14px; max-height:110px; line-height:1.4;
  }
  textarea:focus{ outline:none; border-color:var(--lime); }
  .send{
    width:42px; height:42px; border-radius:12px; border:none; background:var(--lime); color:#0c0e12;
    display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:.15s;
  }
  .send:hover{ background:#d9ff6f; }
  .send:disabled{ background:var(--line); color:var(--muted); cursor:not-allowed; }

  /* ===== MENUS & DROPDOWNS ===== */
  .plus-menu{
    position:absolute; bottom:56px; left:10px; width:190px; background:var(--panel-2);
    border:1px solid var(--line); border-radius:12px; padding:6px; display:none; flex-direction:column; gap:2px;
    box-shadow:0 12px 30px -10px rgba(0,0,0,0.6); z-index:20;
  }
  .plus-menu.show{ display:flex; }
  .plus-item{ display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; cursor:pointer; font-size:13px; color:var(--text); }
  .plus-item span{ flex:1; }
  .plus-item:hover{ background:var(--bg); color:var(--lime); }
  .plus-item.back{ color:var(--muted); font-size:11.5px; border-bottom:1px solid var(--line); margin-bottom:3px; padding-bottom:10px; }

  .mention-dropdown{
    position:absolute; bottom:52px; left:0; width:100%; background:var(--panel-2);
    border:1px solid var(--line); border-radius:12px; padding:6px; display:none; z-index:20;
    box-shadow:0 12px 30px -10px rgba(0,0,0,0.6);
  }
  .mention-dropdown.show{ display:block; }
  .mention-item{ display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:8px; cursor:pointer; }
  .mention-item:hover{ background:var(--bg); }
  .mention-item b{ color:var(--lime); font-family:'JetBrains Mono', monospace; font-size:12.5px; }
  .mention-item span{ font-size:11px; color:var(--muted); }

  /* ===== OVERLAY VIEWER ===== */
  .overlay{ position:absolute; inset:0; background:rgba(0,0,0,0.6); display:none; align-items:center; justify-content:center; z-index:30; }
  .overlay.show{ display:flex; }
  .viewer-panel{ width:100%; height:100%; background:var(--panel); display:flex; flex-direction:column; }
  .viewer-header{
    display:flex; align-items:center; gap:8px; padding:10px 12px; border-bottom:1px solid var(--line);
    background:var(--panel-2); font-family:'JetBrains Mono', monospace; font-size:12px; color:var(--text);
  }
  .viewer-favicon{ width:16px; height:16px; border-radius:3px; }
  .viewer-header a, .viewer-header button{
    background:transparent; border:1px solid var(--line); color:var(--muted); width:28px; height:28px;
    border-radius:7px; display:flex; align-items:center; justify-content:center; cursor:pointer; text-decoration:none; font-size:14px;
  }
  .viewer-header a:hover, .viewer-header button:hover{ color:var(--lime); border-color:var(--lime); }
  .viewer-iframe{ flex:1; width:100%; border:none; background:#fff; }
  .viewer-note{ font-size:10px; color:var(--muted); font-family:'JetBrains Mono', monospace; padding:6px 12px; border-top:1px solid var(--line); background:var(--panel-2); }
</style>
</head>
<body>

<div class="main-container">
  
  <!-- PANEL CHAT UTAMA -->
  <div class="app">
    <div class="head">
      <div class="avatar">IF<div class="dot"></div></div>
      <div class="head-info">
        <div class="head-name">ifxrq <span class="head-tag">ONLINE</span></div>
        <div class="head-sub" id="pingLine">watskin jr. · ping 24ms</div>
      </div>
    </div>

    <div class="hud">
      <div>sesi: <b id="hudSession">----</b></div>
      <div>pesan: <b id="hudCount">0</b></div>
    </div>

    <div class="chat" id="chat"></div>
    <div class="attach-strip" id="attachStrip"></div>

    <div class="inputbar">
      <input type="file" id="fileInput" multiple hidden>
      <div class="iconbtn" id="plusBtn" title="tambah">+</div>
      <div class="plus-menu" id="plusMenu"></div>

      <div class="input-wrap">
        <textarea id="input" placeholder="ketik kodingan gratis atau apa aja ke ifxrq... (@search buat internet)" rows="1"></textarea>
        <div class="mention-dropdown" id="mentionDropdown"></div>
      </div>

      <button class="send" id="sendBtn" title="kirim">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </div>
  </div>

  <!-- CLAUDE STYLE SIDE ARTIFACT PANEL -->
  <div class="artifact-panel" id="artifactPanel">
    <div class="artifact-head">
      <div class="artifact-title" id="artifactTitle">Artifact Output</div>
      <div class="artifact-tabs">
        <button class="art-tab active" id="btnArtCode">Code</button>
        <button class="art-tab" id="btnArtPreview">Preview</button>
      </div>
      <div class="artifact-actions">
        <button class="art-btn" id="btnArtCopy">Salin</button>
        <button class="art-btn" id="btnArtDownload">Unduh Dokumen</button>
        <button class="art-btn" id="btnArtClose" style="color:var(--danger);">✕</button>
      </div>
    </div>
    <div class="artifact-body">
      <pre id="artifactPre"><code id="artifactCode" class="language-html"></code></pre>
      <iframe class="artifact-preview-frame" id="artifactIframe"></iframe>
    </div>
  </div>

</div>

<!-- SOURCE VIEWER OVERLAY -->
<div class="overlay" id="viewerOverlay">
  <div class="viewer-panel">
    <div class="viewer-header">
      <img id="viewerFavicon" class="viewer-favicon">
      <span id="viewerHost">-</span>
      <div style="flex:1"></div>
      <a id="viewerNewTab" href="#" target="_blank" rel="noopener" title="buka di tab baru">↗</a>
      <button type="button" id="viewerClose" title="tutup">✕</button>
    </div>
    <iframe id="viewerIframe" class="viewer-iframe"></iframe>
    <div class="viewer-note">nampilin sumber tanpa keluar dari ifxrqxiters.my.id</div>
  </div>
</div>

<script>
const MODEL = "gemini-3.1-flash-lite";
const CHAT_ENDPOINT = "/plugins/chat";
const SEARCH_ENDPOINT = "/plugins/search";

marked.setOptions({ gfm: true, breaks: true });

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function normalizeText(value){
  if (typeof value === 'string') return value;
  if (value == null) return '';
  if (typeof value === 'object') {
    return normalizeText(value.text ?? value.content ?? value.message ?? value.result ?? value.answer ?? value.response) || JSON.stringify(value);
  }
  return String(value);
}

function highlightMentions(root){
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
  const nodes = [];
  while (walker.nextNode()) nodes.push(walker.currentNode);
  nodes.forEach(node => {
    const text = node.nodeValue;
    if (!text || !/@[\w-]+/.test(text)) return;
    if (node.parentElement && node.parentElement.closest('code, pre, a')) return;
    const frag = document.createDocumentFragment();
    let lastIndex = 0;
    text.replace(/@([\w-]+)/g, (match, cmd, offset) => {
      if (offset > lastIndex) frag.appendChild(document.createTextNode(text.slice(lastIndex, offset)));
      const span = document.createElement('span');
      span.className = 'plugin-mention';
      span.textContent = match;
      frag.appendChild(span);
      lastIndex = offset + match.length;
    });
    if (lastIndex < text.length) frag.appendChild(document.createTextNode(text.slice(lastIndex)));
    node.parentNode.replaceChild(frag, node);
  });
}

function renderMarkdown(raw){
  const source = normalizeText(raw).replace(/^\uFEFF/, '');
  const dirty = marked.parse(source);
  const clean = DOMPurify.sanitize(dirty, { ADD_ATTR: ['target'] });
  const wrap = document.createElement('div');
  wrap.innerHTML = clean;
  highlightMentions(wrap);

  wrap.querySelectorAll('pre code').forEach(codeEl => {
    hljs.highlightElement(codeEl);
    const lang = (codeEl.className.match(/language-(\w+)/) || [,'text'])[1];
    const codeText = codeEl.textContent;
    const pre = codeEl.parentElement;
    
    const block = document.createElement('div');
    block.className = 'code-block';
    const head = document.createElement('div');
    head.className = 'code-head';
    head.innerHTML = `<span>${lang}</span><div class="code-actions-grp"><button type="button" class="btn-open-art">Preview Artifact ↗</button><button type="button" class="btn-copy-raw">copy</button></div>`;
    
    head.querySelector('.btn-copy-raw').addEventListener('click', (e)=>{
      navigator.clipboard.writeText(codeText);
      e.target.textContent = 'disalin ✓';
      setTimeout(()=> e.target.textContent = 'copy', 1500);
    });

    head.querySelector('.btn-open-art').addEventListener('click', ()=>{
      openArtifactView(codeText, lang);
    });

    pre.replaceWith(block);
    block.appendChild(head);
    block.appendChild(pre);
  });

  return wrap;
}

// ===== ARTIFACT CONTROL FUNCTIONS =====
function openArtifactView(code, lang) {
  activeArtifactData.code = code;
  activeArtifactData.lang = lang;
  activeArtifactData.filename = `output.${lang === 'javascript' ? 'js' : lang === 'typescript' ? 'ts' : lang}`;
  if(lang === 'html' || lang === 'xml') activeArtifactData.filename = 'index.html';

  artifactCode.textContent = code;
  artifactCode.className = `language-${lang}`;
  hljs.highlightElement(artifactCode);

  if(lang === 'html' || lang === 'svg') {
    artifactIframe.srcdoc = code;
    btnArtPreview.style.display = 'block';
  } else {
    artifactIframe.srcdoc = '';
    btnArtPreview.style.display = 'none';
    showArtifactTab('code');
  }

  artifactPanel.classList.add('show');
}

function showArtifactTab(tab) {
  if(tab === 'code') {
    btnArtCode.classList.add('active');
    btnArtPreview.classList.remove('active');
    artifactPre.style.display = 'block';
    artifactIframe.style.display = 'none';
  } else {
    btnArtPreview.classList.add('active');
    btnArtCode.classList.remove('active');
    artifactPre.style.display = 'none';
    artifactIframe.style.display = 'block';
  }
}

btnArtDownload.addEventListener('click', () => {

  a.download = activeArtifactData.filename;

function tryAutoExtractArtifact(text) {
  const codeBlockRegex = /```(\w*)\n([\s\S]*?)```/g;
  const match = codeBlockRegex.exec(text);
  if(match) {
    const lang = match[1] || 'html';
    const code = match[2];
    setTimeout(() => openArtifactView(code, lang), 400);
  }
}

// ===== FILE PREPARATION & UPLOAD ENGINE =====
function fileToBase64(file){
  return new Promise((resolve, reject)=>{
    const r = new FileReader(); r.onload = ()=> resolve(r.result.split(',')[1]); r.onerror = reject; r.readAsDataURL(file);
  });
}
function fileToText(file){
  return new Promise((resolve, reject)=>{
    const r = new FileReader(); r.onload = ()=> resolve(r.target.result); r.onerror = reject; r.readAsText(file);
  });
}

// FUNGSI UTAMA UPLOAD KE UGUU.SE
async function uploadToUguu(file) {
  const formData = new FormData();
  formData.append('files[]', file);
  const res = await fetch('https://uguu.se/upload.php', { method: 'POST', body: formData });
  if(!res.ok) throw new Error('gagal upload ke server uguu.se');
  const data = await res.json();
  return data.files[0].url;
}

function renderAttachStrip(){
  attachStrip.innerHTML = '';
  attachments.forEach((a, idx)=>{
    const chip = document.createElement('div'); chip.className = 'chip';
    if(a.mimeType.startsWith('image/')){ chip.innerHTML = `<img src="${a.previewUrl}">`; }
    else { chip.innerHTML = `<div class="filedot">📄</div>`; }
    const label = document.createElement('span'); label.textContent = a.name.length > 16 ? a.name.slice(0,14) + '…' : a.name;
    chip.appendChild(label);
    const rm = document.createElement('button'); rm.textContent = '✕';
    rm.addEventListener('click', ()=>{ attachments.splice(idx,1); renderAttachStrip(); });
    chip.appendChild(rm); attachStrip.appendChild(chip);
  });
}

fileInput.addEventListener('change', async ()=>{
  for(const file of fileInput.files){
    if(file.size > 8 * 1024 * 1024){ addSystemLine(`[system] ${file.name} kegedean (>8mb), skip`, true); continue; }
    
    let textBody = null;
    const isTextFile = file.type.startsWith('text/') || /\.(js|ts|html|css|json|py|cpp|c|cs|go|sh|md|txt)$/i.test(file.name);
    if(isTextFile) {
      try { textBody = await fileToText(file); } catch(e){}
    }

    const data = await fileToBase64(file);
    attachments.push({
      name: file.name,
      mimeType: file.type || 'application/octet-stream',
      data: data,
      textBody: textBody, 
      fileBlob: file, // Diperlukan untuk proses form-data upload uguu
      previewUrl: file.type.startsWith('image/') ? URL.createObjectURL(file) : null
    });
  }
  fileInput.value = ''; renderAttachStrip();
});

    plusMenu.innerHTML = `<div class="plus-item back" data-action="back">← kembali</div>${items}`;

function handlePlusAction(action){
  if(['camera','photo','file'].includes(action)){
    if(action==='camera') { fileInput.setAttribute('capture', 'environment'); fileInput.setAttribute('accept', 'image/*'); }
    else if(action==='photo') { fileInput.removeAttribute('capture'); fileInput.setAttribute('accept', 'image/*'); }
    else { fileInput.removeAttribute('capture'); fileInput.setAttribute('accept', '*/*'); }
    fileInput.click(); closePlusMenu();
  } else if(action === 'plugin'){ plusMode = 'plugin'; renderPlusMenu(); }
  else if(action === 'back'){ plusMode = 'main'; renderPlusMenu(); }
  else if(action && action.startsWith('plugin:')){ insertMention(action.split(':')[1]); closePlusMenu(); }
}

function openPlusMenu(){ plusMode = 'main'; renderPlusMenu(); plusMenu.classList.add('show'); plusBtn.classList.add('active'); }
function closePlusMenu(){ plusMenu.classList.remove('show'); plusBtn.classList.remove('active'); }
plusBtn.addEventListener('click', (e)=>{ e.stopPropagation(); if(plusMenu.classList.contains('show')) closePlusMenu(); else openPlusMenu(); });

  if(!mentionDropdown.contains(e.target) && e.target !== inputEl) mentionDropdown.classList.remove('show');
});

function insertMention(cmd){
  const current = inputEl.value; const caretPos = inputEl.selectionStart;
  const before = current.slice(0, caretPos); const after = current.slice(caretPos);
  const match = before.match(/@(\w*)$/);
  let newValue, newCaret;
  if(match){ newValue = before.slice(0, match.index) + '@' + cmd + ' ' + after; newCaret = match.index + cmd.length + 2; }
  else { newValue = (before ? before + ' ' : '') + '@' + cmd + ' ' + after; newCaret = newValue.length - after.length; }
  inputEl.value = newValue; inputEl.focus(); inputEl.setSelectionRange(newCaret, newCaret); inputEl.dispatchEvent(new Event('input'));
}

function renderMentionDropdown(filtered){
  mentionDropdown.innerHTML = filtered.map(p => `<div class="mention-item" data-cmd="${p.cmd}">${p.icon}<div><b>@${p.cmd}</b><br><span>${p.desc}</span></div></div>`).join('');
  mentionDropdown.querySelectorAll('.mention-item').forEach(el=>{
    el.addEventListener('click', ()=>{ insertMention(el.dataset.cmd); mentionDropdown.classList.remove('show'); });
  });
  mentionDropdown.classList.add('show');
}

inputEl.addEventListener('input', ()=>{
  inputEl.style.height = 'auto'; inputEl.style.height = Math.min(inputEl.scrollHeight, 110) + 'px';
  const caretPos = inputEl.selectionStart; const beforeCaret = inputEl.value.slice(0, caretPos);
  const match = beforeCaret.match(/@(\w*)$/);
  if(match){
    const q = match[1].toLowerCase(); const filtered = PLUGINS.filter(p => p.cmd.startsWith(q));
    if(filtered.length){ renderMentionDropdown(filtered); return; }
  }
  mentionDropdown.classList.remove('show');
});

function extractFirstUrl(text){
  const match = String(text || '').match(/https?:\/\/[^\s)\]\}>'"]+/i); return match ? match[0] : '';
}

async function runEditPlugin(fileBlob, promptText, originalText){
  addBubble('user', originalText, false);
  history.push({ role:'user', parts:[{ text: originalText }] });
  inputEl.value = ''; inputEl.style.height = 'auto'; sendBtn.disabled = true; attachments = []; renderAttachStrip(); showTyping();

  try {
    // 1. Upload file blob otomatis ke Uguu.se
    addSystemLine("[system] sedang mengunggah gambar ke uguu.se...", false);
    const publicUguuUrl = await uploadToUguu(fileBlob);
    
    // 2. Tembak endpoint /plugins/edit bawaan backend kita
    const res = await fetch(EDIT_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: publicUguuUrl, prompt: promptText })
    });
    
    const text = await upstream = await res.text();
    hideTyping();
    let data; try { data = JSON.parse(text); } catch(_){}

    if (!res.ok) {
      addSystemLine(`[error] plugin edit gagal — ${data?.error?.message || text}`, true);
      history.pop(); return;
    }

    const finalImageUrl = data?.image || data?.url || data?.result || extractFirstUrl(text);
    if (!finalImageUrl) {
      addSystemLine('[error] link hasil manipulasi edit gambar gak keluar', true);
      history.pop(); return;
    }

    addImageBubble(finalImageUrl, `sukses memproses edit foto. prompt: ${promptText}`);
    history.push({ role:'model', parts:[{ text: `[sukses mengedit foto dengan hasil] ${finalImageUrl}` }] });
  } catch(err) {
    hideTyping(); addSystemLine(`[error] proses edit gagal — ${err.message}`, true); history.pop();
  } finally { sendBtn.disabled = false; inputEl.focus(); }
}

async function runSearchPlugin(originalText, query){
  addBubble('user', originalText, false);
  history.push({ role:'user', parts:[{ text: originalText }] });
  inputEl.value = ''; inputEl.style.height = 'auto'; sendBtn.disabled = true; hudCount.textContent = history.filter(h=>h.role==='user').length; showTyping();

  try{
    const res = await fetch(`${SEARCH_ENDPOINT}?message=${encodeURIComponent(query)}&model=think-deeper`);
    const data = await res.json(); hideTyping();
    if(!res.ok){ addSystemLine(`[error] plugin search gagal`, true); history.pop(); return; }

    const answer = data.message || data.result || data.answer || JSON.stringify(data);
    let rawSources = data.sources || data.links || [];
    const sources = rawSources.map(s => (typeof s === 'string' ? {title:s, url:s} : {title:s.title||'sumber', url:s.url||s.link})).filter(s=>s.url);

    addSearchBubble(answer, sources);
    history.push({ role:'model', parts:[{ text: answer }] });
  }catch(err){ hideTyping(); addSystemLine(`[error] search gagal — ${err.message}`, true); history.pop(); }
  finally{ sendBtn.disabled = false; inputEl.focus(); }
}

async function runCoderPlugin(originalText, promptText) {
  addBubble('user', originalText, false);
  history.push({ role:'user', parts:[{ text: originalText }] });
  inputEl.value = ''; inputEl.style.height = 'auto'; sendBtn.disabled = true; showTyping();

  try {
    const session = hudSession.textContent;
    const res = await fetch(CODER_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: promptText, session: session })
    });
    const data = await res.json();
    hideTyping();

    const reply = data.result || data.message || data.answer || JSON.stringify(data);
    addBubble('bot', reply, true);
    history.push({ role:'model', parts:[{ text: reply }] });
    tryAutoExtractArtifact(reply);
  } catch(err) {
    hideTyping(); addSystemLine(`[error] AI Coder gagal — ${err.message}`, true); history.pop();
  } finally { sendBtn.disabled = false; inputEl.focus(); }
}

async function runRingkasPlugin(originalText, query){
  addBubble('user', originalText, false); history.push({ role:'user', parts:[{ text: originalText }] });
  inputEl.value = ''; inputEl.style.height = 'auto'; sendBtn.disabled = true; showTyping();
  try{
    const res = await fetch(CHAT_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: MODEL, systemInstruction: 'kamu tugasnya cuma merangkum teks secara singkat, padat, dan jelas.',
        contents: [{ role:'user', parts:[{ text: query }]}]
      })
    });
    const data = await res.json(); hideTyping();
    const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text || data?.text || '[kosong]';
    addBubble('bot', reply, true); history.push({ role:'model', parts:[{ text: reply }] });
  }catch(err){ hideTyping(); addSystemLine(`[error] ringkas gagal`, true); history.pop(); }
  finally{ sendBtn.disabled = false; inputEl.focus(); }
}

// ===== UTAMA: KIRIM PESAN & AUTO ROUTING DETEKSI KODINGAN =====
async function sendMessage(){
  let raw = inputEl.value.trim();
  if(!raw && attachments.length === 0) return;

  // Bangun teks tambahan dari isi file teks yang dibaca otomatis
  let fileContextText = "";
  attachments.forEach(a => {
    if(a.textBody) {
      fileContextText += `\n\n[Isi Berkas File Dokumen: ${a.name}]\n\`\`\`\n${a.textBody}\n\`\`\``;
    }
  });

  const fullPromptToSend = raw + fileContextText;

  // 1. SISTEM DETEKSI OTOMATIS FITUR EDIT FOTO (Kirim Foto + Prompt)
  const hasImage = attachments.some(a => a.mimeType.startsWith('image/'));
  const isEditKeyword = /\b(edit|ubah|ganti|jadikan|manipulasi)\b/i.test(raw);
  
  if (hasImage && (isEditKeyword || raw.startsWith('@edit'))) {
    const imgAttach = attachments.find(a => a.mimeType.startsWith('image/'));
    const cleanPrompt = raw.replace(/@edit/i, '').replace(/\b(edit|ubah|ganti|jadikan|manipulasi)\b/i, '').trim() || "modernize";
    await runEditPlugin(imgAttach.fileBlob, cleanPrompt, raw || `edit foto jadi ${cleanPrompt}`);
    return;
  }

  // 2. Cek explicit mention plugin terpisah
  const searchMatch = raw.match(/^@search\s+([\s\S]+)/i);
  if(searchMatch){ await runSearchPlugin(raw, searchMatch[1].trim()); return; }

  const ringkasMatch = raw.match(/^@ringkas\s+([\s\S]+)/i);
  if(ringkasMatch){ await runRingkasPlugin(raw, ringkasMatch[1].trim()); return; }

  // 3. DETEKSI OTOMATIS REQUEST KODINGAN TANPA MENGGUNAKAN AWALAN @
  const codeKeywords = /\b(buat|bikin|coding|code|script|program|html|css|js|php|python|java|website|landing page|portfolio|ui|tabel)\b/i;
  if(codeKeywords.test(raw) && !raw.startsWith('@')) {
    await runCoderPlugin(raw, fullPromptToSend);
    return;
  }

  // 4. Fallback ke Chat Gemini Biasa
  const parts = [];
  if(fullPromptToSend) parts.push({ text: fullPromptToSend });
  attachments.forEach(a => {
    if(!a.textBody) parts.push({ inlineData: { mimeType: a.mimeType, data: a.data } });
  });

  const row = addBubble('user', raw || '(kirim file)', false);
  if(attachments.length){
    const wrap = document.createElement('div');
    attachments.forEach(a=>{
      if(a.previewUrl){
        const img = document.createElement('img'); img.src = a.previewUrl; img.style.maxWidth = '160px'; img.style.borderRadius = '9px'; img.style.marginTop = '6px';
        wrap.appendChild(img);
      }
    });
    row.querySelector('.bubble').appendChild(wrap);
  }

  history.push({ role:'user', parts });
  inputEl.value = ''; inputEl.style.height = 'auto'; attachments = []; renderAttachStrip();
  sendBtn.disabled = true; hudCount.textContent = history.filter(h=>h.role==='user').length; showTyping();

  try{
    const res = await fetch(CHAT_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: MODEL, systemInstruction: SYSTEM_PROMPT, contents: history })
    });
    const data = await res.json(); hideTyping();
    if(!res.ok){ addSystemLine(`[error] gagal connect ke backend chat`, true); history.pop(); return; }

    const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text || '[kosong]';
    addBubble('bot', reply, true);
    history.push({ role:'model', parts:[{ text: reply }] });
    tryAutoExtractArtifact(reply);
  }catch(err){ hideTyping(); addSystemLine(`[error] request gagal`, true); history.pop(); }
  finally{ sendBtn.disabled = false; inputEl.focus(); }
}
